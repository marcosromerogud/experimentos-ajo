<style>
  @font-face {
    font-family: Flexo;
    font-style: normal;
    font-weight: 400;
    src:
      url(/ViaBCPThemeLight/fonts/webfontkit-FlexoItalic-FlexoRegular/Flexo-Regular-webfont.woff2),
      url(/ViaBCPThemeLight/fonts/webfontkit-FlexoItalic-FlexoRegular/Flexo-Regular-webfont.woff);
  }

  @font-face {
    font-family: Flexo;
    font-style: italic;
    font-weight: 400;
    src:
      url(/ViaBCPThemeLight/fonts/webfontkit-FlexoItalic-FlexoRegular/Flexo-It-webfont.woff2),
      url(/ViaBCPThemeLight/fonts/webfontkit-FlexoItalic-FlexoRegular/Flexo-It-webfont.woff);
  }

  @font-face {
    font-family: Flexo;
    font-style: normal;
    font-weight: 700;
    src:
      url(/ViaBCPThemeLight/fonts/webfontkit-FlexoBold-FlexoBlack/Flexo-Bold-webfont.woff2),
      url(/ViaBCPThemeLight/fonts/webfontkit-FlexoBold-FlexoBlack/Flexo-Bold-webfont.woff);
  }

  @font-face {
    font-family: Flexo-Demi;
    font-style: normal;
    font-weight: 400;
    src:
      url(/ViaBCPThemeLight/fonts/webfontkit-FlexoDemi-FlexoHeavy/Flexo-Demi-webfont.woff2),
      url(/ViaBCPThemeLight/fonts/webfontkit-FlexoDemi-FlexoHeavy/Flexo-Demi-webfont.woff);
  }

  @font-face {
    font-family: Flexo-Medium;
    font-style: normal;
    font-weight: 400;
    src:
      url(/ViaBCPThemeLight/fonts/webfontkit-FlexoMedium/Flexo-Medium-webfont.woff2),
      url(/ViaBCPThemeLight/fonts/webfontkit-FlexoMedium/Flexo-Medium-webfont.woff);
  }

  @font-face {
    font-family: Flexo-Medium;
    font-style: italic;
    font-weight: 400;
    src:
      url(/ViaBCPThemeLight/fonts/webfontkit-FlexoMedium/Flexo-MediumIt-webfont.woff2),
      url(/ViaBCPThemeLight/fonts/webfontkit-FlexoMedium/Flexo-MediumIt-webfont.woff);
  }

  html {
    scroll-behavior: smooth;
  }

  p,
  span,
  a {
    font-family: Flexo;
  }

  h1 {
    font-family: Flexo-Demi;
  }

  .ma-contenedor {
    padding: 0 16px;
    margin: 0 auto;
    max-width: 1208px;
  }

  @media (width >= 1280px) {
    .ma-contenedor {
      width: 1208px;
      margin-left: auto;
      margin-right: auto;
    }
  }

  @media (width >= 1600px) {
    .ma-contenedor {
      width: var(--width-container-desktop);
    }
  }

  @media (992px <= width <= 1279px) {
    .ma-contenedor {
      width: 936px;
    }
  }

  @media (768px <= width <= 991px) {
    .ma-contenedor {
      width: 732px;
    }
  }

  @media (width <= 767px) {
    .ma-contenedor {
      width: auto;
    }
  }

  /* Bloque: ma-descubre */
  .ma-descubre {
    background: linear-gradient(135deg, #000a23 0%, #0030a1 100%);
    position: relative;
    overflow: hidden;
  }

  /* Elemento: header */
  .ma-descubre__header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding-block: 20px;
  }

  /* Elemento: logo */
  .ma-descubre__logo {
    width: 92px;
  }

  /* Elemento: separator */
  .ma-descubre__separator {
    width: 1px;
    height: 22px;
    background-color: white;
  }

  /* Elemento: product-label */
  .ma-descubre__product-label {
    font-weight: 400;
    font-size: 16px;
    line-height: 24px;
    margin: 0;
    color: rgba(255, 255, 255, 0.8);
  }

  /* Nav links lead */
  .ma-descubre__nav {
    margin-left: auto;
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .ma-descubre__nav-link {
    font-family: Flexo-Demi;
    font-size: 14px;
    line-height: 20px;
    color: rgba(255, 255, 255, 0.9);
    text-decoration: none;
    white-space: nowrap;
  }

  .ma-descubre__nav-link:hover {
    color: #ffffff;
    text-decoration: none;
  }

  @media (width <= 991px) {
    .ma-descubre__nav-link:nth-child(1) {
      display: none;
    }
  }

  /* Elemento: hero */
  .ma-descubre__hero {
    padding: 0 16px;
    display: flex;
    align-items: center;
    min-height: 500px;
  }

  @media (width <= 991px) {
    .ma-descubre__hero {
      flex-direction: column;
      text-align: center;
      margin-top: 32px;
    }
  }

  /* Elemento: title */
  .ma-descubre__title {
    font-size: 56px;
    line-height: 64px;
    font-weight: 600;
    color: white;
    margin: 0;
    margin-bottom: 24px;
  }

  @media (768px <= width <= 991px) {
    .ma-descubre__title {
      font-size: 36px;
      line-height: 42px;
    }
  }

  @media (width <= 767px) {
    .ma-descubre__title {
      font-size: 32px;
      line-height: 40px;
      text-align: center;
      margin-bottom: 16px;
    }
  }

  @media (width <= 767px) {
    .ma-descubre__separator {
      display: none;
    }

    .ma-descubre__product-label {
      display: none;
    }

    .ma-descubre__logo {
      width: 64px;
    }
  }

  .ma-descubre__button {
    font-family: Flexo-Demi;
    font-size: 16px;
    line-height: 16px;
    color: white;
    padding: 16px 24px;
    background-color: #ff7800;
    border-radius: 50px;
    will-change: box-shadow;
    animation: pulse-bcp 1.8s ease-in-out infinite;
    user-select: none;
    text-decoration: none;
  }

  @keyframes pulse-bcp {
    0% {
      box-shadow: 0 0 0 0 rgba(255, 216, 159, 0.75);
    }
    60% {
      box-shadow: 0 0 0 0.65rem rgba(255, 216, 159, 0);
    }
    100% {
      box-shadow: 0 0 0 0 rgba(255, 216, 159, 0);
    }
  }

  /* Wrapper: ocupa la mitad derecha del hero y centra la tarjeta */
  .ma-descubre__card-wrap {
    flex: 0 0 50%;
    align-self: stretch;
    display: flex;
    justify-content: end;
    align-items: center;
  }

  .ma-descubre__image {
    width: 100%;
    max-width: 458px;
    height: auto;
    opacity: 0;
    align-self: end;
    animation:
      ma-leadCardIn 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards,
      ma-leadCardFloat 4s ease-in-out 1.1s infinite,
      ma-leadCardGlow 3.5s ease-in-out 1.1s infinite;
  }

  @keyframes ma-leadCardIn {
    from { opacity: 0; transform: translateX(70px); filter: drop-shadow(0 0 0px transparent); }
    to   { opacity: 1; transform: translateX(0);    filter: drop-shadow(0 12px 24px rgba(80, 130, 255, 0.45)); }
  }

  @media (width <= 991px) {
    @keyframes ma-leadCardIn {
      from { opacity: 0; transform: translateY(40px); filter: drop-shadow(0 0 0px transparent); }
      to   { opacity: 1; transform: translateY(0);    filter: drop-shadow(0 12px 24px rgba(80, 130, 255, 0.45)); }
    }
  }

  @keyframes ma-leadCardFloat {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(12px); }
  }

  @keyframes ma-leadCardGlow {
    0%, 100% { filter: drop-shadow(0 12px 22px rgba(80, 130, 255, 0.38)); }
    50%       { filter: drop-shadow(0 16px 40px rgba(100, 160, 255, 0.70)); }
  }

  @media (992px <= width <= 1280px) {
    .ma-descubre__image {
      max-width: 400px;
    }
  }

  @media (768px <= width <= 991px) {
    .ma-descubre__card-wrap {
      flex: 0 0 auto;
      width: 100%;
      justify-content: center;
    }
    .ma-descubre__image {
      width: 320px;
      display: block;
    }
  }

  @media (width <= 767px) {
    .ma-descubre__card-wrap {
      flex: 0 0 auto;
      width: 100%;
      justify-content: center;
    }
    .ma-descubre__image {
      width: 240px;
      display: block;
    }
  }

  /* === Card Stack === */
  .ma-card-stack {
    position: relative;
    width: 100%;
    max-width: 560px;
    height: 450px;
    flex-shrink: 0;
  }

  @media (992px <= width <= 1280px) {
    .ma-card-stack {
      max-width: 455px;
      height: 370px;
    }
  }

  @media (width <= 991px) {
    .ma-card-stack {
      max-width: 440px;
      height: 320px;
      margin: 0 auto;
    }
  }

  .ma-card-stack__card {
    position: absolute;
    width: 72%;
    top: 30px;
    left: 8%;
    will-change: opacity, transform;
    opacity: 0;
  }

  /* Posiciones iniciales: todas vienen desde abajo */
  .ma-card-stack__card:nth-child(1) {
    z-index: 1;
    transform: translateX(28px) translateY(120px);
    transition:
      opacity 0.5s ease-out 0s,
      transform 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0s;
  }
  .ma-card-stack__card:nth-child(2) {
    z-index: 2;
    transform: translateX(21px) translateY(120px);
    transition:
      opacity 0.5s ease-out 0.1s,
      transform 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s;
  }
  .ma-card-stack__card:nth-child(3) {
    z-index: 3;
    transform: translateX(14px) translateY(120px);
    transition:
      opacity 0.5s ease-out 0.2s,
      transform 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s;
  }
  .ma-card-stack__card:nth-child(4) {
    z-index: 4;
    transform: translateX(7px) translateY(120px);
    transition:
      opacity 0.5s ease-out 0.3s,
      transform 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s;
  }
  .ma-card-stack__card:nth-child(5) {
    z-index: 5;
    transform: translateX(0) translateY(120px);
    transition:
      opacity 0.5s ease-out 0.4s,
      transform 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.4s;
  }

  /* Posiciones finales: una encima de otra, separadas verticalmente */
  .ma-card-stack--visible .ma-card-stack__card:nth-child(1) {
    opacity: 1;
    transform: translateY(120px);
  }
  .ma-card-stack--visible .ma-card-stack__card:nth-child(2) {
    opacity: 1;
    transform: translateY(90px);
  }
  .ma-card-stack--visible .ma-card-stack__card:nth-child(3) {
    opacity: 1;
    transform: translateY(60px);
  }
  .ma-card-stack--visible .ma-card-stack__card:nth-child(4) {
    opacity: 1;
    transform: translateY(30px);
  }
  .ma-card-stack--visible .ma-card-stack__card:nth-child(5) {
    opacity: 1;
    transform: translateY(0);
  }

  @media (prefers-reduced-motion: reduce) {
    .ma-card-stack__card {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
    }
  }

  @media (width <= 991px) {
    .ma-descubre__button {
      display: inline-block;
      margin-bottom: 36px;
    }
  }

  .ma-descubre__button:hover {
    text-decoration: none;
    color: white;
    background: #ff961f;
  }

  @keyframes jumpInfinite {
    0% {
      transform: translateX(-50%) translateY(0);
    }
    50% {
      transform: translateX(-50%) translateY(20px);
    }
    100% {
      transform: translateX(-50%) translateY(0);
    }
  }

  @keyframes jumpInfiniteInline {
    0% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(10px);
    }
    100% {
      transform: translateY(0);
    }
  }

  .ma-descubre__hero-arrow-2 {
    position: absolute;
    bottom: 30px;
    left: 50%;
    animation: jumpInfinite 1.5s infinite;
  }

  @media (width <= 991px) {
    .ma-descubre__hero-arrow-2 {
      display: none;
    }
  }

  .ma-descubre__hero-body {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    flex: 0 0 50%;
    min-width: 0;
  }

  @media (width <= 991px) {
    .ma-descubre__hero-body {
      flex: 0 0 auto;
      align-items: center;
    }
  }

  .ma-descubre__hero-body .down-arrow {
    display: none;
  }

  @media (width <= 991px) {
    .ma-descubre__hero-body .down-arrow {
      display: block;
      animation: jumpInfiniteInline 1.5s infinite;
    }
  }

  .ma-beneficios__contenedor {
    padding-top: 120px;
    padding-bottom: 44px;
  }

  @media (width <= 991px) {
    .ma-beneficios__contenedor {
      padding-top: 64px;
      padding-bottom: 64px;
    }
  }

  .ma-beneficios {
    background: linear-gradient(to bottom, #d9ebff, #ffffff);
  }

  @media (width <= 991px) {
    .ma-beneficios {
      background: #ebf4ff;
    }
  }

  /* Bloque: Beneficios */
  .ma-beneficios__title {
    text-align: center;
    color: #002a8d;
    font-family: Flexo-Demi;
    margin: 0;
    font-size: 40px;
    line-height: 48px;
  }

  @media (width <= 991px) {
    .ma-beneficios__title {
      font-size: 24px;
      line-height: 32px;
    }
  }

  .ma-beneficios__beneficios {
    max-width: 1012px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    margin-top: 56px;
  }

  .ma-beneficios__beneficio {
    flex: 0 0 calc(33.333% - 11px);
    box-sizing: border-box;
  }

  @media (width <= 767px) {
    .ma-beneficios__beneficio {
      flex: 0 0 100%;
    }
  }

  .ma-beneficios__beneficio {
    border-radius: 8px;
    background-color: white;
    border: 1px solid #e5e7eb;
    display: flex;
    gap: 8px;
    padding: 16px;
    align-items: center;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .ma-beneficios__beneficio:hover {
    transform: scale(1.03);
    box-shadow: 0 6px 20px rgba(0, 42, 141, 0.12);
  }

  .ma-beneficios__descripcion {
    margin: 0;
    font-size: 16px;
    line-height: 24px;
    color: #202e44;
  }

  .ma-beneficios__descripcion span {
    font-family: Flexo-Demi;
    font-weight: 600;
  }

  .ma-beneficios__imagen {
    width: 100%;
    max-width: 64px;
  }

  .ma-beneficios__button {
    display: block;
    border-radius: 24px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
    padding: 16px 24px;
    background-color: #ff7800;
    font-family: Flexo-Demi;
    font-size: 16px;
    line-height: 16px;
    text-align: center;
    text-decoration: none;
    margin-top: 56px;
    color: #ffffff;
    user-select: none;
  }

  @media (width <= 991px) {
    .ma-beneficios__button {
      margin-top: 64px;
    }
  }

  .ma-beneficios__button:hover {
    text-decoration: none;
    color: #ffffff;
    background: #ff961f;
  }

  .ma-legales {
    margin-bottom: 64px;
  }

  @media (width <= 991px) {
    .ma-legales {
      margin-bottom: 32px;
    }
  }

  /* CTA Tarjeta */
  .ma-ctatarjeta {
    margin-bottom: 64px;
    overflow: hidden;
  }

  .ma-ctatarjeta__imagen {
    width: 160px;
    height: auto;
    object-fit: contain;
    flex-shrink: 0;
    display: block;
    align-self: flex-end;
  }

  .ma-ctatarjeta__contenido {
    flex: 1;
  }

  .ma-ctatarjeta__titulo {
    font-family: Flexo-Demi;
    font-weight: 600;
    font-size: 32px;
    line-height: 40px;
    color: #002691;
    margin: 0 0 8px 0;
    max-width: 520px;
  }

  @media (width <= 991px) {
    .ma-ctatarjeta__titulo {
      font-size: 24px;
      line-height: 32px;
      text-align: center;
    }
  }

  .ma-ctatarjeta__subtitulo {
    font-family: Flexo;
    font-size: 14px;
    line-height: 20px;
    color: #414142;
    margin: 0;
  }

  .ma-ctatarjeta__button {
    display: block;
    flex-shrink: 0;
    border-radius: 24px;
    padding: 16px 24px;
    background-color: #ff7800;
    font-family: Flexo-Demi;
    font-size: 16px;
    line-height: 16px;
    text-align: center;
    text-decoration: none;
    color: #ffffff;
    white-space: nowrap;
    user-select: none;
  }

  .ma-ctatarjeta__button:hover {
    background: #ff961f;
    text-decoration: none;
    color: #ffffff;
  }

  @media (width <= 991px) {
    .ma-ctatarjeta {
      margin-bottom: 32px;
    }

    .ma-ctatarjeta__imagen {
      width: 50%;
      max-width: 200px;
    }

    .ma-ctatarjeta__button {
      width: fit-content;
    }
  }

  /* FAQ */
  .ma-faq {
    margin-top: 64px;
    margin-bottom: 64px;
  }

  .ma-faq__titulo {
    font-family: Flexo-Demi;
    font-size: 32px;
    line-height: 40px;
    color: #002691;
    text-align: center;
    margin: 0 0 44px 0;
  }

  @media (width <= 991px) {
    .ma-faq__titulo {
      font-size: 24px;
      line-height: 32px;
      margin-bottom: 32px;
    }
  }

  .ma-faq__item {
    margin-bottom: 8px;
  }

  .ma-faq__pregunta {
    width: 100%;
    border: none;
    cursor: pointer;
    padding: 18px 16px;
    background: #f2f4f8;
    border-radius: 8px;
    display: flex;
    align-items: center;
    text-align: left;
  }

  .ma-faq__pregunta-texto {
    font-family: Flexo-Demi;
    font-size: 16px;
    line-height: 20px;
    color: #202e44;
    margin: 0;
    flex: 1;
    padding-right: 10px;
  }

  .ma-faq__icono {
    flex-shrink: 0;
    transition: transform 0.4s linear;
  }

  .ma-faq__item--activo .ma-faq__icono {
    transform: rotate(180deg);
  }

  .ma-faq__respuesta {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease-out;
  }

  .ma-faq__respuesta-inner {
    font-family: Flexo;
    font-size: 14px;
    line-height: 20px;
    color: #202e44;
    padding: 0 20px;
    text-align: left;
  }

  .ma-faq__respuesta-inner p {
    margin: 8px 0;
  }

  .ma-faq__respuesta-inner a {
    color: #002691;
  }

  .ma-faq__respuesta-inner ol,
  .ma-faq__respuesta-inner ul {
    padding-left: 24px;
    margin: 8px 0;
  }

  .ma-faq__respuesta-inner h3 {
    font-family: Flexo-Demi;
    font-size: 14px;
    line-height: 20px;
    color: #202e44;
    margin: 16px 0 4px;
  }

  @media (min-width: 768px) {
    .ma-faq__respuesta-inner {
      font-size: 16px;
      line-height: 24px;
      padding: 16px 24px 24px;
    }

    .ma-faq__respuesta-inner h3 {
      font-size: 16px;
      line-height: 24px;
    }

    .ma-faq__contenedor {
      max-width: 632px;
      margin-left: auto;
      margin-right: auto;
    }

    .ma-faq__respuesta-inner p {
      margin: 12px 0;
    }
  }

  /* TIDS3 — Todo lo que debes saber (tabs puras) */
  .bcp_todo_lo_que_debes_saber_TIDS3 .ma-tids-container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 24px; box-sizing: border-box; }
  .bcp_todo_lo_que_debes_saber_TIDS3 .bcp_grupo_contenido_tabs { width: 100%; overflow: hidden; }
  .bcp_todo_lo_que_debes_saber_TIDS3 .bcp_grupo_contenedor_tabs { height: 60px; width: 100%; padding-bottom: 2px; overflow: hidden; position: relative; }
  .bcp_todo_lo_que_debes_saber_TIDS3 .bcp_grupo_contenedor_detalle_tab { overflow: hidden; }
  .bcp_todo_lo_que_debes_saber_TIDS3 .bcp_tab_componente_TIDS3 { display: none; height: max-content; }
  .bcp_todo_lo_que_debes_saber_TIDS3 .bcp_tab_componente_TIDS3.active { display: block; }
  .bcp_todo_lo_que_debes_saber_TIDS3 .bcp_tab_componente_TIDS3.ma-slide-from-right { animation: ma-slideFromRight 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
  .bcp_todo_lo_que_debes_saber_TIDS3 .bcp_tab_componente_TIDS3.ma-slide-from-left { animation: ma-slideFromLeft 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
  @keyframes ma-slideFromRight { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes ma-slideFromLeft { from { transform: translateX(-60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .bcp_todo_lo_que_debes_saber_TIDS3 h2.bcp_titulo_grupo { font-family: Flexo-Demi; font-style: normal; font-weight: normal; text-align: center; color: #002A8D; margin: 0; }
  .bcp_todo_lo_que_debes_saber_TIDS3 .bcp_contenedor_lista_tabs { border-bottom: 1px solid #E5E7EB; width: max-content; margin: 0 auto; }

  /* CTA Pin */

  .ma-ctatarjeta__contenedor {
    background-color: #ebf4ff;

    display: flex;
    align-items: center;
    padding: 16px 64px 16px 64px;
    gap: 64px;

  @media (width <= 991px) {
    .ma-ctatarjeta__contenedor {

      align-self: center;

  /* Legales */
  .ma-legales__contenedor {
    border-top: 1px solid #414142;

  .ma-legales__legales {
    color: #414142;

    line-height: 18px;
  }

  .ma-legales__superior p {

    font-family: Flexo;
  }

  .ma-legales__superior p span {
    font-family: Flexo-Demi;
    font-weight: 600;
  }

  @media (width >= 768px) {
    .ma-legales__franja img {
      width: 296px;
      height: 90px;
      object-fit: cover;
    }
  }

  @media (width <= 767px) {
    .ma-legales__franja img {
      width: auto;
      height: 88px;
      object-fit: contain;
    }
  }

  .ma-legales__superior {
    margin-bottom: 16px;
    margin-top: 16px;
    display: flex;
    align-items: center;
  }

  @media (width <= 767px) {
    .ma-legales__superior {
      flex-direction: column;
      gap: 16px;
    }
  }

  .ma-legales__inferior {
    margin-bottom: 16px;
  }

  .ma-legales__inferior p {
    margin: 0;
  }

  .ma-legales__inferior p span {
    font-weight: 600;
  }

  /* ── Sección Pasos ── */
  .section_pasos_home_new {
    overflow-x: hidden;
    padding: 64px 0 0;
  }

  .titulo_contenedor_pasos {
    text-align: center;
    padding: 0 24px;
    margin-bottom: 0;
  }

  .titulo_contenedor_pasos h2 {
    font-family: Flexo-Demi;
    font-size: 32px;
    line-height: 40px;
    color: #002a8d;
    margin: 0 0 12px;
  }

  .titulo_contenedor_pasos p {
    font-size: 16px;
  }

  .text_decoration_pasos {
    color: #ff7800;
    text-decoration: none;
    font-weight: bold;
  }

  .slider_home_paso {
    display: flex;
    scroll-snap-type: x mandatory;
    overflow-x: auto;
  }

  .slider_home_paso::-webkit-scrollbar {
    display: none;
  }

  .slide_home_paso {
    flex: 0 0 76%;
    margin-right: 16px;
    border: 1px solid #d8dfea;
    border-radius: 16px;
    padding: 16px 18px;
    scroll-snap-align: center;
  }

  .slide_home_paso:first-child {
    margin-left: 24px;
  }

  .slide_home_paso img {
    width: 140px;
  }

  .contenedor_info_paso {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .body_info_paso {
    flex: 1;
  }

  .number_paso {
    padding: 1.5px 0;
    border-radius: 50%;
    border: 2px solid #002a8d;
    color: #002a8d;
    width: 24px;
    height: 24px;
    display: inline-block;
    text-align: center;
    font-weight: 600;
    font-size: 14px;
  }

  .subtitle_paso {
    color: #002a8d;
    font-family: Flexo-Demi;
    font-size: 16px;
    margin: 14px 0 6px;
  }

  .bajada_paso {
    margin: 0;
    font-size: 14px;
  }

  .controls_slide_pasos {
    display: flex;
    gap: 24px;
    padding-top: 24px;
    justify-content: center;
    margin-bottom: 54px;
  }

  .section_pasos_home_new .controls_slide_pasos button {
    border: none;
    cursor: pointer;
    background-color: transparent;
    padding: 0;
    transition: opacity 0.2s ease;
  }

  .section_pasos_home_new .controls_slide_pasos button:disabled {

    cursor: default;
  }

  .pasos_buton_center {
    display: flex;

    padding-bottom: 64px;
  }

  .pasos_desktop_st {
    display: none;
  }

    gap: 16px;
    margin-bottom: 16px;

  }

  .st_pasos_stepper span {

    height: 28px;
    display: inline-block;

    padding: 3px 0;

  /* === Animaciones de entrada scroll === */
  [data-ma-reveal] {
    opacity: 0;
    will-change: opacity, transform;
    transition:
      opacity 0.55s ease-out,
      transform 0.55s ease-out;
  }
  [data-ma-reveal="left"] {
    transform: translateY(24px);
  }
  [data-ma-reveal="right"] {
    transform: translateY(24px);
  }
  [data-ma-reveal="bottom"] {
    transform: translateY(24px);
  }

  @media (min-width: 768px) {
    [data-ma-reveal="left"] {
      transform: translateX(-56px);
    }
    [data-ma-reveal="right"] {
      transform: translateX(56px);
    }
    [data-ma-reveal="bottom"] {
      transform: translateY(36px);
    }
  }

  [data-ma-reveal].ma-visible {
    opacity: 1;
    transform: translate(0, 0);
    will-change: auto;
  }

  @keyframes ma-ctaFloat {
    0%, 100% { transform: translateY(-5px); }
    50%      { transform: translateY(5px); }
  }

  .ma-ctatarjeta__imagen.ma-visible {
    animation: ma-ctaFloat 3s ease-in-out 0.6s infinite;
  }

  @media (prefers-reduced-motion: reduce) {
    [data-ma-reveal] {
      opacity: 1;
      transform: none;
      transition: none;
      will-change: auto;
    }
    .ma-ctatarjeta__imagen.ma-visible {
      animation: none;
    }
  }

          btn.addEventListener("click", () => {
            if (typeof getOffer === "function") getOffer(btn.dataset.offer);
          });
        });
      maPromBullets.forEach((bullet, i) => {
        bullet.addEventListener("click", () => {
          maPromCurrentIdx = i;
          maUpdatePromSlider();
        });
      });
      const maPromContainer = contenedor.querySelector(
        ".slider-container_promociones_new",
      );
      let maPromTouchStartX = 0;
      maPromContainer.addEventListener(
        "touchstart",
        (e) => {
          maPromTouchStartX = e.changedTouches[0].clientX;
        },
        { passive: true },
      );
      maPromContainer.addEventListener(
        "touchend",
        (e) => {
          const diff = maPromTouchStartX - e.changedTouches[0].clientX;
          if (Math.abs(diff) > 40) {
            maPromCurrentIdx =
              diff > 0
                ? Math.min(maPromCurrentIdx + 1, maPromBullets.length - 1)
                : Math.max(maPromCurrentIdx - 1, 0);
            maUpdatePromSlider();
          }
        },
        { passive: true },
      );
      maUpdatePromSlider();

      if (false) { // ── INICIO TIDS3 LEAD — comentado para próxima reanudación
      const maFaqEl = contenedor.querySelector(".ma-faq");
      if (maFaqEl) {
        const maTidsSection = document.createElement("section");
        maTidsSection.id = "82736044-e5c8-42dd-b271-ef21d8a4cdc2";
        maTidsSection.setAttribute("role", "region");
        maTidsSection.setAttribute("aria-label", "Todo lo que debes saber sobre tu Cuenta Digital BCP");
        maTidsSection.className = "bcp_todo_lo_que_debes_saber_TIDS3";
        maTidsSection.setAttribute("data-alineacion", "CENTRADO");
        maTidsSection.innerHTML = `
          <div class="ma-tids-container">
            <h2 class="bcp_titulo_grupo">Conoce todo sobre la tarjeta</h2>
            <div class="bcp_grupo_contenido_tabs">
              <div class="bcp_grupo_contenedor_tabs">
                <div class="bcp_contenedor_lista_tabs" role="tablist" aria-label="Todo lo que debes saber sobre tu Tarjeta de Crédito BCP">
                  <button class="bcp_tab_button active" data-idtab="ma-tab-beneficios-detalle" type="button" role="tab" data-tab="Beneficios">Beneficios</button>
                  ${maTipoTab ? `<button class="bcp_tab_button" data-idtab="ma-tab-marca-detalle" type="button" role="tab" data-tab="${maTipoTab}">${maTipoTab}</button>` : ""}
                  <button class="bcp_tab_button" data-idtab="ma-tab-tasas-detalle" type="button" role="tab" data-tab="Tasas y tarifas">Tasas y tarifas</button>
                  <button class="bcp_tab_button" data-idtab="ma-tab-requisitos-detalle" type="button" role="tab" data-tab="Requisitos">Requisitos</button>
                  <button class="bcp_tab_button" data-idtab="ma-tab-consideraciones-detalle" type="button" role="tab" data-tab="Consideraciones">Consideraciones</button>
                </div>
              </div>
              <div class="bcp_grupo_contenedor_detalle_tab">
                <div class="bcp_tab_contenidos bcp_formateado_TIDS3">
                  <div class="bcp_tab_componente_TIDS3 active" data-idtab="ma-tab-beneficios-detalle" data-titulo="Beneficios" data-tipo="texto-enriquecido" role="tabpanel">
                    ${tc.beneficiosTids || ""}
                  </div>
                  ${maTipoTab ? `<div class="bcp_tab_componente_TIDS3" data-idtab="ma-tab-marca-detalle" data-titulo="${maTipoTab}" data-tipo="texto-enriquecido" role="tabpanel">
                    <!-- Contenido ${maTipoTab} -->
                  </div>` : ""}
                  <div class="bcp_tab_componente_TIDS3" data-idtab="ma-tab-tasas-detalle" data-titulo="Tasas y tarifas" data-tipo="texto-enriquecido" role="tabpanel">
                    <!-- Contenido Tasas y tarifas -->
                  </div>
                  <div class="bcp_tab_componente_TIDS3" data-idtab="ma-tab-requisitos-detalle" data-titulo="Requisitos" data-tipo="texto-enriquecido" role="tabpanel">
                    <!-- Contenido Requisitos -->
                  </div>
                  <div class="bcp_tab_componente_TIDS3" data-idtab="ma-tab-consideraciones-detalle" data-titulo="Consideraciones" data-tipo="texto-enriquecido" role="tabpanel">
                    <!-- Contenido Consideraciones -->
                  </div>
                </div>
              </div>
            </div>
          </div>`;
        maFaqEl.replaceWith(maTidsSection);

        // Tabs con Swiper para drag/swipe
        var maTidsTabsEl = maTidsSection.querySelector(".bcp_grupo_contenedor_tabs");
        var maTidsWrapper = maTidsSection.querySelector(".bcp_contenedor_lista_tabs");
        var maTidsTabs = maTidsSection.querySelectorAll(".bcp_tab_button");
        var maTidsPanels = maTidsSection.querySelectorAll(".bcp_tab_componente_TIDS3");

        var maActivePanelIdx = 0;
        maTidsTabs.forEach(function(tab, i) {
          tab.addEventListener("click", function() {
            if (i === maActivePanelIdx) return;
            var slideClass = i > maActivePanelIdx ? "ma-slide-from-right" : "ma-slide-from-left";
            maActivePanelIdx = i;
            maTidsTabs.forEach(function(t) { t.classList.remove("active"); });
            maTidsPanels.forEach(function(p) { p.classList.remove("active", "ma-slide-from-right", "ma-slide-from-left"); });
            tab.classList.add("active");
            var panel = maTidsSection.querySelector('.bcp_tab_componente_TIDS3[data-idtab="' + tab.dataset.idtab + '"]');
            if (panel) {
              panel.classList.add("active", slideClass);
              panel.addEventListener("animationend", function() { panel.classList.remove(slideClass); }, { once: true });
            }
            tab.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
          });
        });

        /* Swiper comentado — no disponible en el entorno host del piloto
        if (typeof Swiper !== "undefined" && maTidsWrapper) {
          maTidsWrapper.classList.add("swiper-wrapper");
          maTidsTabs.forEach(function(t) { t.classList.add("swiper-slide"); });
          new Swiper(maTidsTabsEl, {
            slidesPerView: "auto",
            freeMode: true,
            grabCursor: true,
            mousewheel: { forceToAxis: true }
          });
        }
        */

        // Desplegables del panel Beneficios (misma lógica que el FAQ nolead)
        maTidsSection.querySelectorAll(".ma-faq__pregunta").forEach(function(boton) {
          boton.addEventListener("click", function() {
            var item = boton.parentElement;
            var respuesta = item.querySelector(".ma-faq__respuesta");
            var abierto = item.classList.contains("ma-faq__item--activo");
            maTidsSection.querySelectorAll(".ma-faq__item--activo").forEach(function(i) {
              i.classList.remove("ma-faq__item--activo");
              i.querySelector(".ma-faq__respuesta").style.maxHeight = null;
              i.querySelector(".ma-faq__pregunta").setAttribute("aria-expanded", "false");
              i.querySelector(".ma-faq__respuesta").setAttribute("aria-hidden", "true");
            });
            if (!abierto) {
              item.classList.add("ma-faq__item--activo");
              respuesta.style.maxHeight = respuesta.scrollHeight + "px";
              boton.setAttribute("aria-expanded", "true");
              respuesta.setAttribute("aria-hidden", "false");
            }
          });
        });
      }
      } // ── FIN TIDS3 LEAD comentado
    }
  })();
</script>
