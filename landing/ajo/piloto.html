<script>
(function () {
  var style = document.createElement('style');
  style.textContent = '.bcp-etiqueta-exp::after{content:"";position:absolute;width:4px;height:4px;background-color:#0030b3;border-radius:0 0 6px 0;right:0;bottom:-4px;}';
  document.head.appendChild(style);

  var targetBox = null;
  var boxes = document.querySelectorAll('.bcp-tienda-online-mi-espacio-bcp .bcp-box');
  boxes.forEach(function (box) {
    var titulo = box.querySelector('.bcp-titulo');
    if (titulo && titulo.textContent.trim() === 'Obtener una Tarjeta') {
      targetBox = box;
      var boxInfo = box.querySelector('.bcp-box-info');
      var etiqueta = document.createElement('div');
      etiqueta.className = 'bcp-etiqueta-exp';
      etiqueta.setAttribute('attr-color', '');
      etiqueta.textContent = 'Premio';
      etiqueta.style.cssText = 'position:absolute;background:#0a47f0;color:#fff;right:-4px;top:-8px;border-radius:10px 10px 0px;padding:1px 8px;font-size:12px;line-height:14px;font-family:Flexo-Demi,sans-serif;font-weight:normal;';
      boxInfo.insertBefore(etiqueta, boxInfo.firstChild);
    }
  });

  var section = document.querySelector('.bcp-tienda-online-mi-espacio-bcp');
  if (section) {
    var observer = new IntersectionObserver(function (entries, obs) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          digitalData.push({
            "promotion": {
              "name": "Home - ViaBCP - TC0061 - P",
              "creative": "Button",
              "position": "Obtener una tarjeta - Premio"
            },
            "event": "trackPromotionView"
          });
          obs.disconnect();
        }
      });
    });
    observer.observe(section);
  }

  if (targetBox) {
    targetBox.addEventListener('click', function () {
      digitalData.push({
        "promotion": {
          "name": "Home - ViaBCP - TC0061 - P",
          "creative": "Button",
          "position": "Obtener una tarjeta - Premio"
        },
        "event": "trackPromotionClick"
      });
    });
  }
})();
</script>
