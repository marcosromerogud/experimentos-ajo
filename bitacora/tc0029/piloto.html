<style id="tc0029-styles">
    /* Definir estilos scopeados del banner (grid por áreas) */

    /* Mobile por defecto: 2 columnas, 2 filas
   Col 1: content (fila 1) + cta (fila 2)
   Col 2: image (fila 1 y fila 2)
   Ocultar subtítulo en mobile */
    .tc0029-scope .tc0029-banner {
        --bg-mobile: var(--d-9-d-9-d-9, rgba(255, 255, 255, 0.05));
        --bg-desktop: var(--transparent_white-white_10, rgba(255, 255, 255, 0.10));
        --title-color: var(--on-white, #FFF);
        --subtitle-color: var(--on-white, #FFF);
        --link-color: #FF623F;

        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        grid-template-areas:
            "content image"
            "cta     image";
        align-items: center;
        gap: 8px 12px;
        padding: 12px 16px;
        min-height: 120px;
        /* mobile ≈ 120px */
        border-radius: 16px;
        background:  #EBF4FF;
        border-radius: 12px;
        box-sizing: border-box;

        font-family: Montserrat, Arial, "Helvetica Neue", Helvetica, sans-serif;
        color: var(--title-color);
    }

    /* Definir áreas hijas */
    .tc0029-scope .tc0029-banner__content {
        grid-area: content;
        display: grid;
        gap: 6px;
        align-content: center;
        justify-items: center;
    }

    .tc0029-scope .tc0029-banner__cta {
        grid-area: cta;
        display: grid;
        justify-items: center;
    }

    .tc0029-scope .tc0029-banner__imageWrap {
        grid-area: image;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Estilar título */
    .tc0029-scope .tc0029-banner__title {
        color: #002A8D;

        font-family: Flexo;
        font-size: 32px;
        font-style: normal;
        font-weight: 600;
        line-height: 40px;
        margin: 0;
    }

    /* Estilar subtítulo (ocultar en mobile) */
    .tc0029-scope .tc0029-banner__subtitle {
        color:  #202E44;
        text-align: center;

        /* R/Paragraph-L */
        font-family: Flexo;
        font-size: 16px;
        font-style: normal;
        font-weight: 400;
        line-height: 24px;
    }

    /* Estilar entry point */
    .tc0029-scope .tc0029-entry {
        color: #FFF;
        text-align: center;
        font-family: Flexo;
        font-size: 16px;
        font-style: normal;
        font-weight: 600;
        line-height: 16px;
        display: flex;
        padding: 16px 24px;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
        border-radius: 24px;
        background: #FF7800;
    }

    /* Estilar imagen */
    .tc0029-scope .tc0029-banner__img {
        display: block;
        max-width: 100%;
        height: auto;
        max-height: 224px;
        object-fit: contain;
        border: 0;
    }

    /* Desktop forzado por clase en el parent: 3 columnas, 1 fila
   [Imagen] | [Título + Subtítulo] | [CTA] */
    .tc0029-scope.tc0029--desktop .tc0029-banner {
        grid-template-columns: 1fr 2.5fr 1fr;
        grid-template-rows: auto;
        grid-template-areas: "image content cta";
        gap: 24px;
        padding: 12px 24px;
        min-height: 90px;
        /* desktop ≈ 90px */
        border-radius: 16px;
        background: #EBF4FF;
        margin: 50px auto;
    }

    /* Ajustar alineaciones en desktop */
    .tc0029-scope.tc0029--desktop .tc0029-banner__content {
        justify-items: start;
        gap: 4px;
    }

    .tc0029-scope.tc0029--desktop .tc0029-banner__title {
        text-align: left;
    }

    .tc0029-scope.tc0029--desktop .tc0029-banner__subtitle {
        display: block;
        text-align: left;
    }

    /* .tc0029-scope.tc0029--desktop .tc0029-banner__img     { max-height: 66px; } */

    /* Accesibilidad foco visible */
    .tc0029-scope a:focus-visible {
        outline: 2px solid currentColor;
        outline-offset: 2px;
    }

    /* Mobile */
    @media (max-width: 768px) {
        .tc0029-scope .tc0029-banner {
            margin: 0;
            padding: 24px;
            gap: 0;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 0.5fr 0.3fr;
            grid-template-areas: none;
        }

        .tc0029-scope .tc0029-banner__title {
            color: #002A8D;
            text-align: center;
            font-family: Flexo;
            font-size: 24px;
            font-style: normal;
            font-weight: 600;
            line-height: 32px;
        }

        .tc0029-scope .tc0029-entry {
            color: var(#FF623F);
            text-align: center;
            font-size: 14px;
            font-style: normal;
            font-weight: 500;
            line-height: normal;
        }

        .tc0029-scope .tc0029-banner__content {
            justify-items: center;
            grid-row-start: 2;
            grid-row-end: 3;
            grid-column-start: 1;
            grid-column-end: 2;
        }
        .tc0029-scope .tc0029-banner__imageWrap {
            grid-row-start: 1;
            grid-row-end: 2;
            grid-column-start: 1;
            grid-column-end: 2;
        }

        .tc0029-scope .tc0029-banner__cta {
            justify-items: center;
            align-self: center;
            grid-row-start: 3;
            grid-row-end: 4;
            grid-column-start: 1;
            grid-column-end: 2;
        }

        .tc0029-scope .tc0029-banner__img {
            max-height: 224px;
        }
    }
</style>

<script>
    (function () {
        "use strict";

        // ===== CONFIG =====
        const CFG = {
            parentSelector: ".id-Z7_8ILI09412PVV0062BTDN8MN5Q4 .bcp-grupo-categoria-tarjetas:not(.ocultar)",
            insertPosition: "beforeend", // "afterbegin" | "beforeend" | "beforebegin" | "afterend"
            bodyWidthBreakpoint: 768,

            titleText: "Adquiere hoy tu Tarjeta de Crédito BCP",
            subtitleText: "y disfruta de todos sus beneficios.",
            linkHref: "https://www.mitarjetabcp.viabcp.com/?pcid=viabcp:beneficios:adquiere-tu-tarjeta:experimento:obtenla-aqui",
            linkText: "Obtenla aquí",

            imgDesktop: { src: "https://www.viabcp.com/wcm/connect/18c4427a-d7a6-455e-9973-2e53b461803f/landingBeneficios_entryPoint-desktop-230226.png?MOD=AJPERES&attachment=false&id=1771887245514", alt: "Imagen descriptiva desktop" },
            imgMobile: { src: "https://www.viabcp.com/wcm/connect/18c4427a-d7a6-455e-9973-2e53b461803f/landingBeneficios_entryPoint-desktop-230226.png?MOD=AJPERES&attachment=false&id=1771887245514", alt: "Imagen descriptiva mobile" },

            scopeClass: "tc0029-scope",
            desktopStateClass: "tc0029--desktop",
            blockSelector: '[data-offer-id="tc0029"][data-instance="banner"]',

            debug: true
        };

        const log = (...a) => CFG.debug && console.log("[tc0029]", ...a);
        const warn = (...a) => CFG.debug && console.warn("[tc0029]", ...a);
        const $ = (s, r = document) => { try { return r.querySelector(s); } catch (e) { warn("querySelector error", s, e.message); return null; } };

        // ===== HTML (SIN escapes por ahora para aislar el problema) =====
        const html = `
<section class="tc0029-banner container" role="region" aria-label="Promoción destacada" data-offer-id="tc0029" data-instance="banner" data-version="3.2.0">
  <div class="tc0029-banner__content">
    <h2 class="tc0029-banner__title">${CFG.titleText}</h2>
    <p class="tc0029-banner__subtitle">${CFG.subtitleText}</p>
  </div>

  <div class="tc0029-banner__imageWrap">
    <img class="tc0029-banner__img" src="" alt="" loading="lazy" decoding="async" />
  </div>

  <div class="tc0029-banner__cta">
    <a class="tc0029-entry" href="${CFG.linkHref}" aria-label="${CFG.linkText} hacia ${CFG.linkHref}">${CFG.linkText}</a>
  </div>
</section>
`.trim();

        function isDesktopByBody() {
            const w = Math.round((document.body?.getBoundingClientRect().width) || window.innerWidth || 0);
            return w >= (CFG.bodyWidthBreakpoint || 1024);
        }

        function applyState(parent) {
            const desktop = isDesktopByBody();
            parent.classList.toggle(CFG.desktopStateClass, desktop);

            const block = $(CFG.blockSelector, parent);
            if (!block) { warn("applyState: block no encontrado"); return; }

            // Imagen
            const img = block.querySelector(".tc0029-banner__img");
            if (img) {
                const chosen = desktop ? CFG.imgDesktop : CFG.imgMobile;
                img.src = (chosen && chosen.src) ? chosen.src : "";
                img.alt = (chosen && typeof chosen.alt === "string") ? chosen.alt : "";
                log("img set =>", desktop ? "desktop" : "mobile", img.src);
            } else {
                warn("No se encontró .tc0029-banner__img");
            }

            // Subtítulo visible solo en desktop (refuerzo inline)
            const sub = block.querySelector(".tc0029-banner__subtitle");
            if (sub) {
                // sub.style.display = desktop ? "block" : "none";
                // log("subtitle display:", sub.style.display);
            }
        }

        function safeInsert() {
            const parent = $(CFG.parentSelector);
            if (!parent) { warn("Parent no encontrado:", CFG.parentSelector); return; }

            // Asegurar scope manual
            if (!parent.classList.contains(CFG.scopeClass)) parent.classList.add(CFG.scopeClass);

            // Log del template (para ver exactamente qué se va a insertar)
            log("HTML a insertar:", html);

            // Inserción idempotente
            const already = $(CFG.blockSelector, parent);
            if (already) {
                log("Ya existe el bloque. No se duplica.");
            } else {
                parent.insertAdjacentHTML(CFG.insertPosition, html);
                log("HTML insertado con", CFG.insertPosition);
            }

            // Verificación POST-inserción
            const block = $(CFG.blockSelector, parent);
            if (!block) {
                warn("Post-inserción: NO se localizó el bloque. ¿El template fue alterado?");
                return;
            }

            // DEBUG del contenido interno
            const title = block.querySelector(".tc0029-banner__title");
            const sub = block.querySelector(".tc0029-banner__subtitle");
            const cta = block.querySelector(".tc0029-entry");

            log("DEBUG nodes =>", {
                titleExists: !!title, titleText: title?.textContent || "(vacío)",
                subtitleExists: !!sub, subtitleText: sub?.textContent || "(vacío)",
                ctaExists: !!cta, ctaHref: cta?.getAttribute("href") || "(sin href)", ctaText: cta?.textContent || "(vacío)"
            });

            // Refuerzo por si el parser hubiese vaciado algo (no debería, pero lo forzamos)
            if (title && !title.textContent) title.textContent = String(CFG.titleText || "");
            if (sub && !sub.textContent) sub.textContent = String(CFG.subtitleText || "");
            if (cta) {
                if (!cta.textContent) cta.textContent = String(CFG.linkText || "");
                if (!cta.getAttribute("href")) cta.setAttribute("href", String(CFG.linkHref || "#"));
            }

            // Aplicar estado (desktop/mobile), setear imagen y visibilidad
            applyState(parent);

            // Listeners
            const onResize = (function () { let id; return function () { clearTimeout(id); id = setTimeout(() => applyState(parent), 120); }; })();
            window.addEventListener("resize", onResize, { passive: true });
            window.addEventListener("orientationchange", onResize, { passive: true });
        }

        // Run
        try {
            safeInsert();
        } catch (e) {
            console.error("[tc0029] EXCEPCIÓN en safeInsert:", e);
        }

    })();
</script>

        const warn = (...a) => CFG.debug && console.warn("[tc0029-1]", ...a);
        const $ = (s, r = document) => { try { return r.querySelector(s); } catch (e) { warn("querySelector error", s, e.message); return null; } };

        // ===== HTML (SIN escapes por ahora para aislar el problema) =====
        const html = `
<section class="tc0029-1-banner container" role="region" aria-label="Promoción destacada" data-offer-id="tc0029-1" data-instance="banner" data-version="3.2.0">
  <div class="tc0029-1-banner__content">

    <p class="tc0029-1-banner__subtitle">${CFG.subtitleText}</p>
  </div>

  <div class="tc0029-1-banner__imageWrap">
    <img class="tc0029-1-banner__img" src="" alt="" loading="lazy" decoding="async" />
  </div>

  <div class="tc0029-1-banner__cta">
    <a class="tc0029-1-entry" href="${CFG.linkHref}" aria-label="${CFG.linkText} hacia ${CFG.linkHref}">${CFG.linkText}</a>
  </div>
</section>
`.trim();


        // === helpers para imágenes dinámicas por param ===
        function getUrlParamValue() {
            try {
                const usp = new URLSearchParams(window.location.search);
                return (usp.get(CFG.urlParamKey) || "").toLowerCase().trim();
            } catch (e) {
                warn("URLSearchParams error:", e);
                return "";
            }
        }

        function getDynamicImage(desktop) {
            const key = getUrlParamValue();
            if (key && CFG.imgMap && CFG.imgMap[key]) {
                const entry = CFG.imgMap[key];
                const chosen = desktop ? entry.desktop : entry.mobile;
                if (chosen && chosen.src) {
                    return {
                        src: chosen.src,
                        alt: typeof chosen.alt === "string" ? chosen.alt : (desktop ? (CFG.imgDesktop.alt || "") : (CFG.imgMobile.alt || ""))
                    };
                }
            }
            // fallback
            return desktop ? CFG.imgDesktop : CFG.imgMobile;
        }


        function isDesktopByBody() {
            const w = Math.round((document.body?.getBoundingClientRect().width) || window.innerWidth || 0);
            return w >= (CFG.bodyWidthBreakpoint || 1024);
        }

        function applyState(parent) {
            const desktop = isDesktopByBody();
            parent.classList.toggle(CFG.desktopStateClass, desktop);

            const block = $(CFG.blockSelector, parent);
            if (!block) { warn("applyState: block no encontrado"); return; }

            // Imagen
            const img = block.querySelector(".tc0029-1-banner__img");

            if (img) {
                const chosen = getDynamicImage(desktop);
                img.src = chosen?.src || "";
                img.alt = typeof chosen?.alt === "string" ? chosen.alt : "";
                log("img set =>", desktop ? "desktop" : "mobile", img.src, "(param:", getUrlParamValue() || "none", ")");
            } else {
                warn("No se encontró .tc0029-1-banner__img");
            }


            // Subtítulo visible solo en desktop (refuerzo inline)
            const sub = block.querySelector(".tc0029-1-banner__subtitle");
            if (sub) {
                sub.style.display = desktop ? "block" : "none";
                log("subtitle display:", sub.style.display);
            }
        }

        function safeInsert() {
            const parent = $(CFG.parentSelector);
            if (!parent) { warn("Parent no encontrado:", CFG.parentSelector); return; }

            // Asegurar scope manual
            if (!parent.classList.contains(CFG.scopeClass)) parent.classList.add(CFG.scopeClass);

            // Log del template (para ver exactamente qué se va a insertar)
            log("HTML a insertar:", html);

            // Inserción idempotente
            const already = $(CFG.blockSelector, parent);
            if (already) {
                log("Ya existe el bloque. No se duplica.");
            } else {
                parent.insertAdjacentHTML(CFG.insertPosition, html);
                log("HTML insertado con", CFG.insertPosition);
            }

            // Verificación POST-inserción
            const block = $(CFG.blockSelector, parent);
            if (!block) {
                warn("Post-inserción: NO se localizó el bloque. ¿El template fue alterado?");
                return;
            }

            // DEBUG del contenido interno
            const title = block.querySelector(".tc0029-1-banner__title");
            const sub = block.querySelector(".tc0029-1-banner__subtitle");
            const cta = block.querySelector(".tc0029-1-entry");

            log("DEBUG nodes =>", {
                titleExists: !!title, titleText: title?.textContent || "(vacío)",
                subtitleExists: !!sub, subtitleText: sub?.textContent || "(vacío)",
                ctaExists: !!cta, ctaHref: cta?.getAttribute("href") || "(sin href)", ctaText: cta?.textContent || "(vacío)"
            });

            // Refuerzo por si el parser hubiese vaciado algo (no debería, pero lo forzamos)
            if (title && !title.textContent) title.textContent = String(CFG.titleText || "");
            if (sub && !sub.textContent) sub.textContent = String(CFG.subtitleText || "");
            if (cta) {
                if (!cta.textContent) cta.textContent = String(CFG.linkText || "");
                if (!cta.getAttribute("href")) cta.setAttribute("href", String(CFG.linkHref || "#"));
            }

            // Aplicar estado (desktop/mobile), setear imagen y visibilidad
            applyState(parent);

            // Listeners
            const onResize = (function () { let id; return function () { clearTimeout(id); id = setTimeout(() => applyState(parent), 120); }; })();
            window.addEventListener("resize", onResize, { passive: true });
            window.addEventListener("orientationchange", onResize, { passive: true });
        }

        // Run
        try {
            safeInsert();
        } catch (e) {
            console.error("[tc0029-1] EXCEPCIÓN en safeInsert:", e);
        }

    })();
</script>

            }
            // fallback
            return desktop ? CFG.imgDesktop : CFG.imgMobile;
        }

        function isDesktopByBody() {
            const w = Math.round((document.body?.getBoundingClientRect().width) || window.innerWidth || 0);
            return w >= (CFG.bodyWidthBreakpoint || 1024);

            log("HTML a insertar:", html);

            const already = $(CFG.blockSelector, parent);
            if (already) {

                parent.insertAdjacentHTML(CFG.insertPosition, html);
                log("HTML insertado con", CFG.insertPosition);

            const cta = block.querySelector(".tc0029-2-entry");

                ctaExists: !!cta, ctaHref: cta?.getAttribute("href") || "(sin href)", ctaText: cta?.textContent || "(vacío)"

            // Refuerzo por si el parser hubiese vaciado algo (no debería, pero lo forzamos)
            if (title && !title.textContent) title.textContent = String(CFG.titleText || "");
            if (sub && !sub.textContent) sub.textContent = String(CFG.subtitleText || "");

            applyState(parent);

            window.addEventListener("resize", onResize, { passive: true });
            window.addEventListener("orientationchange", onResize, { passive: true });
        }

        // Run
        try {
            safeInsert();
        } catch (e) {
            console.error("[tc0029-2] EXCEPCIÓN en safeInsert:", e);
        }

    })();
</script>

<script>
    (function promoViewScrollOnce() {
        const SEL = '.id-Z7_8ILI09412PVV0062BTDN8MN5Q4 .bcp-grupo-categoria-tarjetas:not(.ocultar)';
        const KEY = '__promo_view_tc0029_ctrl';      // bandera one-shot por vista
        const VIEW_OFFSET = 500;                          // px extra para adelantar
        const EXP_NAME = 'Beneficios TC Detalle - ViaBCP - TC0029 - P';

        // --- utils
        function getDocumentTop(el) {
            // Calcular distancia del elemento al topo del documento
            let y = 0;
            let n = el;
            while (n) { y += n.offsetTop || 0; n = n.offsetParent; }
            return y;
        }

        function isVisible(el) {
            if (!el) return false;
            const rect = el.getBoundingClientRect();
            const vh = window.innerHeight || document.documentElement.clientHeight || 0;
            // Condición de visibilidad básica: cualquier parte visible
            const visible = (rect.top <= vh - VIEW_OFFSET) && (rect.bottom >= 0 + VIEW_OFFSET);
            return visible;
        }

        function pushDigitalData(payload) {
            try {
                if (Array.isArray(window.digitalData)) { window.digitalData.push(payload); return true; }
                if (!window.digitalData) { window.digitalData = []; window.digitalData.push(payload); return true; }
                if (Array.isArray(window.digitalData.events)) { window.digitalData.events.push(payload); return true; }
                window.digitalData.events = []; window.digitalData.events.push(payload); return true;
            } catch (e) { console.warn('[TC0029] digitalData push error:', e); }
            return false;
        }

        function fireOnce() {
            if (window[KEY]) return;
            const ok = pushDigitalData({
                promotion: { name: EXP_NAME, creative: 'Banner', position: 'Adquiere tu Tarjeta' },
                event: 'trackPromotionView'
            });
            console.warn('[TC0029] fireOnce', { position: 'Adquiere tu Tarjeta', t: performance.now() });
            if (ok) window[KEY] = true;
        }

        // --- core
        function start() {
            const el = document.querySelector(SEL);
            if (!el) return;

            // 1) Disparar si ya es visible en la primera pantalla
            if (isVisible(el)) { setTimeout(() => fireOnce(), 200); return; }

            // 2) Escuchar scroll hasta que sea visible (one-shot)
            const onScroll = () => {
                if (window[KEY]) { window.removeEventListener('scroll', onScroll); return; }
                if (isVisible(el)) { fireOnce(); window.removeEventListener('scroll', onScroll); }
            };
            window.addEventListener('scroll', onScroll, { passive: true });

            // 3) Intentar también tras load por posibles layout shifts
            window.addEventListener('load', () => {
                if (!window[KEY] && isVisible(el)) { fireOnce(); window.removeEventListener('scroll', onScroll); }
            }, { once: true });
        }

        // Iniciar ahora (primera carga)
        start();

        // Re‐iniciar al volver con bfcache (back/forward)
        window.addEventListener('pageshow', (ev) => {
            if (ev.persisted) {
                window[KEY] = false; // permitir disparar de nuevo en esta "nueva vista"
                start();
            }
        });
    })();
</script>

<script>
(function promoClickTrack(){
  // Definir selectores y metadatos base
  const SEL       = '.tc0029-2-scope .tc0029-2-entry';
  const EXP_NAME  = 'Beneficios TC Detalle - ViaBCP - TC0029 - P';
  const ACTION    = 'trackPromotionClick';

  // Mapear atributos opcionales del elemento al payload
  const MAP_ATTR = {
    href:  el => el?.getAttribute('href') || '',
    text:  el => (el?.textContent || '').trim(),
    id:    el => el?.id || '',
    role:  el => el?.getAttribute('role') || '',
    label: el => el?.getAttribute('aria-label') || ''
  };

  // --- utils
  function $(s, root = document){ try { return root.querySelector(s); } catch(_) { return null; } }
  function pushDigitalData(payload){
    try{
      if (Array.isArray(window.digitalData)) { window.digitalData.push(payload); return true; }
      if (!window.digitalData) { window.digitalData = []; window.digitalData.push(payload); return true; }
      if (Array.isArray(window.digitalData.events)) { window.digitalData.events.push(payload); return true; }
      window.digitalData.events = []; window.digitalData.events.push(payload); return true;
    }catch(e){ console.warn('[TC0029] digitalData push error:', e); }
    return false;
  }

  function buildPayload(target){
    // Permitir personalizar construcción desde fuera si se requiere
    if (typeof window.onBuildPromoClickPayload === 'function') {
      try { return window.onBuildPromoClickPayload(target, { EXP_NAME, ACTION }); }
      catch(e){ console.warn('[TC0029] onBuildPromoClickPayload error:', e); }
    }
    const data = {};
    for (const k in MAP_ATTR) { try { data[k] = MAP_ATTR[k](target); } catch(_){} }
    return {
      promotion: {
        name: EXP_NAME,
        creative: 'Banner',
        position: 'Adquiere tu Tarjeta 2'
      },
    //   link: data,
      event: ACTION
    };
  }

  // --- core
  function onClick(e){
    // Usar delegación para capturar clics en hijos
    const target = e.target?.closest(SEL);
    if (!target) return;

    // Enviar evento de clic
    const ok = pushDigitalData(buildPayload(target));

    if (ok) { /* opcional: console.debug('click tagged'); */ }
  }

  function start(){
    // Asegurar existencia del contenedor principal si se desea limitar el alcance
    const scope = $('.tc0029-2-scope') || document;
    scope.addEventListener('click', onClick, true);
  }

  // Iniciar
  start();

  // Re-iniciar al volver con bfcache
  window.addEventListener('pageshow', (ev) => {
    if (ev.persisted) {
      // No limpiar listeners: al usar delegación global, el handler sigue válido

    }
  });
})();
