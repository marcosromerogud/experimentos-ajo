<script>
(function () {
  "use strict";

  // ===== CONFIG =====
  
const CFG = {
  // ...
  ctaSelector: ".bcp_banner_producto_pnd .bcp_contenedor_banner a.bcp_boton_banner", // selector del <a> existente
  linkHref: "https://www.viabcp.com/creditos/otros-creditos/prestamo-tarjetero-banca-movil",
  linkText: "Obtenlo aquí",
  scopeClass: "tc0048-scope",
  forceExternal: true, // elimina comportamiento ancla/local
  blockSelector: '[data-offer-id="tc0048"][data-instance="cta"]',
  debug: true
};


  const log = (...a)=> CFG.debug && console.log("[tc0048]", ...a);
  const warn = (...a)=> CFG.debug && console.warn("[tc0048]", ...a);
  const $ = (s, r=document)=>{ try { return r.querySelector(s); } catch(e) { warn("querySelector error", s, e.message); return null; } };

  function updateAnchor(anchor, cfg) {
  if (!(anchor instanceof HTMLAnchorElement)) {
    warn("updateAnchor: nodo no es <a>", anchor);
    return;
  }

  const newHref = String(cfg.linkHref || "").trim();
  const newText = String(cfg.linkText || "").trim();

  // === HREF ===
  if (newHref) {
    const currentHref = anchor.getAttribute("href") || "";

    if (currentHref !== newHref) {
      anchor.setAttribute("href", newHref);
      log("CTA href actualizado:", newHref);
    }
  }

  // === TEXTO ===
  if (newText && anchor.textContent.trim() !== newText) {
    anchor.textContent = newText;
    log("CTA texto actualizado:", newText);
  }

  // === PREVENCIÓN ANCLA / SCROLL ===
  if (cfg.forceExternal) {
    anchor.removeAttribute("data-scroll");
    anchor.removeAttribute("data-anchor");
    anchor.removeAttribute("aria-controls");

    // si antes era "#algo"
    if (anchor.getAttribute("href")?.startsWith("#")) {
      anchor.setAttribute("href", newHref || "#");
    }
  }

  // === HARDENING ===
  anchor.setAttribute("rel", "noopener noreferrer");
}


function overrideClick(anchor, cfg) {
  if (!(anchor instanceof HTMLAnchorElement)) return;

  anchor.addEventListener(
    "click",
    function (event) {
      // cortar TODO
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();

      log("Click CTA overrideado por experiment");

      const href = String(cfg.linkHref || "").trim();
      if (href) {
        window.location.assign(href);
      }
    },
    true // CAPTURE: corre antes que el script legacy
  );
}

function safeInsert() {
  const cta = $(CFG.ctaSelector);
  if (!cta) {
    warn("CTA no encontrado:", CFG.ctaSelector);
    return;
  }

  // Asegurar scope manual
    if (!cta.classList.contains(CFG.scopeClass)) cta.classList.add(CFG.scopeClass);

  updateAnchor(cta, CFG);
  overrideClick(cta, CFG);

  log("CTA final aplicado con override de click", {
    href: cta.getAttribute("href"),
    text: cta.textContent
  });
}

//Run
  try {
    safeInsert();
  } catch (e) {
    console.error("[tc0048] EXCEPCIÓN en safeInsert:", e);
  }

})();

</script>

<script>
(function promoViewScrollOnce(){
  const SEL         = '.bcp_banner_producto_pnd .bcp_contenedor_banner a.bcp_boton_banner.tc0048-scope';
  const KEY         = '__promo_view_tc0048_pil';      // bandera one-shot por vista
  const VIEW_OFFSET = 0;                          // px extra para adelantar
  const EXP_NAME    = 'Prestamo Tarjetero - ViaBCP - TC0048 - P';

  // --- utils
  function getDocumentTop(el){
    // Calcular distancia del elemento al topo del documento
    let y = 0;
    let n = el;
    while (n) { y += n.offsetTop || 0; n = n.offsetParent; }
    return y;
  }

  function isVisible(el){
    if (!el) return false;
    const rect = el.getBoundingClientRect();
    const vh   = window.innerHeight || document.documentElement.clientHeight || 0;
    // Condición de visibilidad básica: cualquier parte visible
    const visible = (rect.top <= vh - VIEW_OFFSET) && (rect.bottom >= 0 + VIEW_OFFSET);
    return visible;
  }

  function pushDigitalData(payload){
    try{
      if (Array.isArray(window.digitalData)) { window.digitalData.push(payload); return true; }
      if (!window.digitalData) { window.digitalData = []; window.digitalData.push(payload); return true; }
      if (Array.isArray(window.digitalData.events)) { window.digitalData.events.push(payload); return true; }
      window.digitalData.events = []; window.digitalData.events.push(payload); return true;
    }catch(e){ console.warn('[TC0048] digitalData push error:', e); }
    return false;
  }

  function fireOnce(){
    if (window[KEY]) return;
    const ok = pushDigitalData({
      promotion: { name: EXP_NAME, creative: 'Banner', position: 'Derivacion a BMO' },
      event: 'trackPromotionView'
    });
    console.warn('[TC0048] fireOnce', { position: 'Derivacion a BMO', t: performance.now() });
    if (ok) window[KEY] = true;
  }

  // --- core
  function start(){
    const el = document.querySelector(SEL);
    if (!el) return;

    // 1) Disparar si ya es visible en la primera pantalla
    if (isVisible(el)) { setTimeout(() => fireOnce(), 500); return; }

    // 2) Escuchar scroll hasta que sea visible (one-shot)
    const onScroll = () => {
      if (window[KEY]) { window.removeEventListener('scroll', onScroll); return; }
      if (isVisible(el)) { fireOnce(); window.removeEventListener('scroll', onScroll); }
    };
    window.addEventListener('scroll', onScroll, { passive: true });

    // 3) Intentar también tras load por posibles layout shifts
    window.addEventListener('load', () => {
      if (!window[KEY] && isVisible(el)) { fireOnce(); window.removeEventListener('scroll', onScroll); }
    }, { once: true });
  }

  // Iniciar ahora (primera carga)
  start();

  // Re‐iniciar al volver con bfcache (back/forward)
  window.addEventListener('pageshow', (ev) => {
    if (ev.persisted) {
      window[KEY] = false; // permitir disparar de nuevo en esta "nueva vista"
      start();
    }
  });
})();
</script>

    }
  });

</script>
