<style id="tc0028-styles">
/* Definir estilos scopeados del banner (grid por áreas) */

/* Mobile por defecto: 2 columnas, 2 filas
   Col 1: content (fila 1) + cta (fila 2)
   Col 2: image (fila 1 y fila 2)
   Ocultar subtítulo en mobile */
.tc0028-scope .tc0028-banner {
  --bg-mobile: var(--d-9-d-9-d-9, rgba(255, 255, 255, 0.05));
  --bg-desktop: var(--transparent_white-white_10, rgba(255, 255, 255, 0.10));
  --title-color: var(--on-white, #FFF);
  --subtitle-color: var(--on-white, #FFF);
  --link-color: #FF623F;

  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto;
  grid-template-areas:
    "content image"
    "cta     image";
  align-items: center;
  gap: 8px 12px;
  padding: 12px 16px;
  min-height: 120px; /* mobile ≈ 120px */
  background: var(--bg-mobile);
  border-radius: 12px;
  box-sizing: border-box;

  font-family: Montserrat, Arial, "Helvetica Neue", Helvetica, sans-serif;
  color: var(--title-color);
}

/* Definir áreas hijas */
.tc0028-scope .tc0028-banner__content   { grid-area: content; display: grid; gap: 6px; align-content: center; justify-items: center; }
.tc0028-scope .tc0028-banner__cta       { grid-area: cta;     display: grid; justify-items: center; }
.tc0028-scope .tc0028-banner__imageWrap { grid-area: image;   display: flex; align-items: center; justify-content: center; }

/* Estilar título */
.tc0028-scope .tc0028-banner__title {
  margin: 0;
  color: var(--title-color);
  font-size: 24px;
  font-style: normal;
  font-weight: 500;
  line-height: 32px; /* 133.333% */
}

/* Estilar subtítulo (ocultar en mobile) */
.tc0028-scope .tc0028-banner__subtitle {
  display: none; /* oculto en mobile */
  margin: 0;
  color: var(--subtitle-color);
  text-align: center;
  font-size: 16px;
  font-style: normal;
  font-weight: 400;
  line-height: 24px; /* 150% */
}

/* Estilar entry point */
.tc0028-scope .tc0028-entry {
  color: var(--link-color);
  text-align: center;
  font-family: Montserrat, Arial, "Helvetica Neue", Helvetica, sans-serif;
  font-size: 14px;
  font-style: normal;
  font-weight: 500;
  line-height: normal;
  text-decoration-line: underline !important;
  text-decoration-style: solid;
  text-decoration-skip-ink: none;
  text-decoration-thickness: auto;
  text-underline-offset: auto;
  text-underline-position: from-font;
  cursor: pointer;
}

/* Estilar imagen */
.tc0028-scope .tc0028-banner__img {
  display: block;
  max-width: 100%;
  height: auto;
  max-height: 90px;
  object-fit: contain;
  border: 0;
}

/* Desktop forzado por clase en el parent: 3 columnas, 1 fila
   [Imagen] | [Título + Subtítulo] | [CTA] */
.tc0028-scope.tc0028--desktop .tc0028-banner {
  grid-template-columns: 1fr 1.8fr 1fr;
  grid-template-rows: auto;
  grid-template-areas: "image content cta";
  gap: 24px;
  padding: 12px 24px;
  min-height: 90px; /* desktop ≈ 90px */
  background: var(--bg-desktop);
  border-radius: 24px;
}

/* Ajustar alineaciones en desktop */
.tc0028-scope.tc0028--desktop .tc0028-banner__content { justify-items: start; gap: 4px; }
.tc0028-scope.tc0028--desktop .tc0028-banner__title   { text-align: left; }
.tc0028-scope.tc0028--desktop .tc0028-banner__subtitle{ display: block; text-align: left; }
/* .tc0028-scope.tc0028--desktop .tc0028-banner__img     { max-height: 66px; } */

/* Accesibilidad foco visible */
.tc0028-scope a:focus-visible { outline: 2px solid currentColor; outline-offset: 2px; }

/* Mobile */
@media (max-width: 768px) {
  .tc0028-scope .tc0028-banner {
    margin: 0 24px;
    padding: 0 0 0 16px;
    gap: 4px 10px;

    justify-items: flex-start;

<script>
(function () {
  "use strict";

  // ===== CONFIG =====
  const CFG = {
    parentSelector: ".id-Z7_8ILI09412H67E0659TH42MJ341",
    insertPosition: "afterbegin", // "afterbegin" | "beforeend" | "beforebegin" | "afterend"
    bodyWidthBreakpoint: 768,

    titleText: "Descubre si hoy tienes tu Tarjeta Visa Qore BCP",
    subtitleText: "Compres lo que compres, págalo con tus puntos.",
    linkHref: "https://www.mitarjetabcp.viabcp.com/login",
    linkText: "Descúbrela aquí",

    imgDesktop: { src: "https://www.viabcp.com/wcm/connect/be1e1971-834c-42a1-b0b7-4ed078ee3334/landingQore_entryPoint1-desktop-190226.png?MOD=AJPERES&attachment=false&id=1771513282274", alt: "Imagen descriptiva desktop" },
    imgMobile:  { src: "https://www.viabcp.com/wcm/connect/9c45736b-875f-4bf7-a57b-d5bfa3ab2d40/landingQore-entryPoint2-mobile-190226.png?MOD=AJPERES&attachment=false&id=1771513074805",  alt: "Imagen descriptiva mobile"  },

    scopeClass: "tc0028-scope",
    desktopStateClass: "tc0028--desktop",
    blockSelector: '[data-offer-id="tc0028"][data-instance="banner"]',

    debug: true
  };

  const log = (...a)=> CFG.debug && console.log("[tc0028]", ...a);
  const warn = (...a)=> CFG.debug && console.warn("[tc0028]", ...a);
  const $ = (s, r=document)=>{ try { return r.querySelector(s); } catch(e) { warn("querySelector error", s, e.message); return null; } };

  // ===== HTML (SIN escapes por ahora para aislar el problema) =====
  const html = `
<section class="tc0028-banner container" role="region" aria-label="Promoción destacada" data-offer-id="tc0028" data-instance="banner" data-version="3.2.0">
  <div class="tc0028-banner__content">
    <h2 class="tc0028-banner__title">${CFG.titleText}</h2>
    <p class="tc0028-banner__subtitle">${CFG.subtitleText}</p>
  </div>

  <div class="tc0028-banner__imageWrap">
    <img class="tc0028-banner__img" src="" alt="" loading="lazy" decoding="async" />
  </div>

  <div class="tc0028-banner__cta">
    <a class="tc0028-entry" href="${CFG.linkHref}" aria-label="${CFG.linkText} hacia ${CFG.linkHref}">${CFG.linkText}</a>
  </div>
</section>
`.trim();

  function isDesktopByBody(){
    const w = Math.round((document.body?.getBoundingClientRect().width) || window.innerWidth || 0);
    return w >= (CFG.bodyWidthBreakpoint || 1024);
  }

  function applyState(parent){
    const desktop = isDesktopByBody();
    parent.classList.toggle(CFG.desktopStateClass, desktop);

    const block = $(CFG.blockSelector, parent);
    if (!block) { warn("applyState: block no encontrado"); return; }

    // Imagen
    const img = block.querySelector(".tc0028-banner__img");
    if (img) {
      const chosen = desktop ? CFG.imgDesktop : CFG.imgMobile;
      img.src = (chosen && chosen.src) ? chosen.src : "";
      img.alt = (chosen && typeof chosen.alt === "string") ? chosen.alt : "";
      log("img set =>", desktop ? "desktop" : "mobile", img.src);
    } else {
      warn("No se encontró .tc0028-banner__img");
    }

    // Subtítulo visible solo en desktop (refuerzo inline)
    const sub = block.querySelector(".tc0028-banner__subtitle");
    if (sub) {
      sub.style.display = desktop ? "block" : "none";
      log("subtitle display:", sub.style.display);
    }
  }

  function safeInsert() {
    const parent = $(CFG.parentSelector);
    if (!parent) { warn("Parent no encontrado:", CFG.parentSelector); return; }

    // Asegurar scope manual
    if (!parent.classList.contains(CFG.scopeClass)) parent.classList.add(CFG.scopeClass);

    // Log del template (para ver exactamente qué se va a insertar)
    log("HTML a insertar:", html);

    // Inserción idempotente
    const already = $(CFG.blockSelector, parent);
    if (already) {
      log("Ya existe el bloque. No se duplica.");
    } else {
      parent.insertAdjacentHTML(CFG.insertPosition, html);
      log("HTML insertado con", CFG.insertPosition);
    }

    // Verificación POST-inserción
    const block = $(CFG.blockSelector, parent);
    if (!block) {
      warn("Post-inserción: NO se localizó el bloque. ¿El template fue alterado?");
      return;
    }

    // DEBUG del contenido interno
    const title = block.querySelector(".tc0028-banner__title");
    const sub   = block.querySelector(".tc0028-banner__subtitle");
    const cta   = block.querySelector(".tc0028-entry");

    log("DEBUG nodes =>", {
      titleExists: !!title, titleText: title?.textContent || "(vacío)",
      subtitleExists: !!sub, subtitleText: sub?.textContent || "(vacío)",
      ctaExists: !!cta, ctaHref: cta?.getAttribute("href") || "(sin href)", ctaText: cta?.textContent || "(vacío)"
    });

    // Refuerzo por si el parser hubiese vaciado algo (no debería, pero lo forzamos)
    if (title && !title.textContent) title.textContent = String(CFG.titleText || "");
    if (sub   && !sub.textContent)   sub.textContent   = String(CFG.subtitleText || "");
    if (cta) {
      if (!cta.textContent) cta.textContent = String(CFG.linkText || "");
      if (!cta.getAttribute("href")) cta.setAttribute("href", String(CFG.linkHref || "#"));
    }

    // Aplicar estado (desktop/mobile), setear imagen y visibilidad
    applyState(parent);

    // Listeners
    const onResize = (function(){ let id; return function(){ clearTimeout(id); id=setTimeout(()=>applyState(parent),120); }; })();
    window.addEventListener("resize", onResize, { passive:true });
    window.addEventListener("orientationchange", onResize, { passive:true });
  }

  // Run
  try {
    safeInsert();
  } catch (e) {
    console.error("[tc0028] EXCEPCIÓN en safeInsert:", e);
  }

})();
</script>

<script>
(function promoViewScrollOnce(){
  const SEL         = '.id-Z7_8ILI09412H67E0659TH42MJ341.tc0028-scope .tc0028-banner';
  const KEY         = '__promo_view_tc0028';      // bandera one-shot por vista
  const VIEW_OFFSET = 0;                          // px extra para adelantar
  const EXP_NAME    = 'Qore - ViaBCP - TC0028 - P';

  // --- utils
  function getDocumentTop(el){
    // Calcular distancia del elemento al topo del documento
    let y = 0;
    let n = el;
    while (n) { y += n.offsetTop || 0; n = n.offsetParent; }
    return y;
  }

  function isVisible(el){
    if (!el) return false;
    const rect = el.getBoundingClientRect();
    const vh   = window.innerHeight || document.documentElement.clientHeight || 0;
    // Condición de visibilidad básica: cualquier parte visible
    const visible = (rect.top <= vh - VIEW_OFFSET) && (rect.bottom >= 0 + VIEW_OFFSET);
    return visible;
  }

  function pushDigitalData(payload){
    try{
      if (Array.isArray(window.digitalData)) { window.digitalData.push(payload); return true; }
      if (!window.digitalData) { window.digitalData = []; window.digitalData.push(payload); return true; }
      if (Array.isArray(window.digitalData.events)) { window.digitalData.events.push(payload); return true; }
      window.digitalData.events = []; window.digitalData.events.push(payload); return true;
    }catch(e){ console.warn('[TC0028] digitalData push error:', e); }
    return false;
  }

  function fireOnce(){
    if (window[KEY]) return;
    const ok = pushDigitalData({
      promotion: { name: EXP_NAME, creative: 'Banner', position: 'Adquiere tu Tarjeta 1' },
      event: 'trackPromotionView'
    });
    if (ok) window[KEY] = true;
  }

  // --- core
  function start(){
    const el = document.querySelector(SEL);
    if (!el) return;

    // 1) Disparar si ya es visible en la primera pantalla
    if (isVisible(el)) { fireOnce(); return; }

    // 2) Escuchar scroll hasta que sea visible (one-shot)
