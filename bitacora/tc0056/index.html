    setTimeout(function () {
      document
        .querySelector(".m-point-cards")
        .classList.remove("m-point-cards--hidden");
      overlay.classList.remove("m-point-cards__overlay--hidden");

        promotion: {

    }, 3500);

    let noOfertaMode = false;

    const contentCard = document.querySelector(".m-point-cards .m-point-card");
    const dniInput = document.getElementById("dni-input");
    const dniError = document.getElementById("dni-error");
    const btnSubmit = document.getElementById("btn-submit");

    const imagenChico = document.querySelector(".m-point-card__chicotarjeta");

    // oldEntryPoint.remove();

    function closeModal() {
      document.querySelector(".m-point-cards").remove();
      overlay.remove();
    }

    const manejarError = (error) => {
      digitalData.push({
        error: {
          code: "error-solicitar-tarjeta",
          message: error,
        },
        event: "trackError",
      });
    };

    const encriptarIDC = async (idc) => {
      // Encripta el IDC usando SHA-512
      const encoder = new TextEncoder();
      const data = encoder.encode(idc);
      const hashBuffer = await crypto.subtle.digest("SHA-512", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray
        .map((b) => b.toString(16).padStart(2, "0"))
        .join("");
      return hashHex;
    };

    async function fetchOferta(dni) {
      try {
        // Generamos IDC
        const { generarIDC } =
          await import("https://www.viabcp.com/wcm/connect/016f5c19-ac9d-4ace-9447-ddbbc66a9fa4/generador-identificadores.js?MOD=AJPERES");
        const idc = generarIDC("DNI", dni, false);

        // Generamos HASH
        const dniHasheado = await encriptarIDC(idc.toUpperCase());

        //Creamos las opciones para el siguiente fetch
        const requestOptions = {
          method: "POST",
          headers: {
            Accept: "application/json",
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            nroDocumentoHash: dniHasheado,
            campana: "BASE_PERSONALIZACION_TC",
          }),
        };

        const response = await fetch(
          "https://www.viabcp.com/apis/public/productocampana/multiuso",
          requestOptions,
        );

        if (response.status == "200") {
          const result = await response.text();
          const resultado = JSON.parse(result);

          if (resultado.length > 0) {
            const codigoTarjeta = resultado[0].data.split("/")[6];
            return codigoTarjeta;
          } else {
            return null;
          }
        } else {
          manejarError(response.status);
        }
      } catch (error) {
        manejarError(error);
        alert("Error de conexión. Verifica tu internet e intenta nuevamente.");
      }
    }

      .addEventListener("click", closeModal);

      this.value = this.value.replace(/\D/g, "");

      }

      setError(false);

    function setOferta(nombre, imagen, oferta) {

        contentCard.innerHTML =

          "</div>" +

          nombre +
          "</p>" +

          imagen +
          '" alt="' +
          nombre +
          '" />' +
          '<img class="m-point-card__background" width="209" src="https://www.viabcp.com/wcm/connect/c87147d3-3534-4a2d-a4bf-f878914acddd/CURVA_VECTOR.png?MOD=AJPERES&CACHEID=ROOTWORKSPACE-c87147d3-3534-4a2d-a4bf-f878914acddd-pPci1Wg&cache=false" alt="ilustacion tarjeta 2" />' +
          "</div>" +
          '<div class="m-point-card__cuerpo m-point-card__cuerpo--response">' +
          '<button class="m-point-card__button" id="btn-accept">¡La quiero!</button>' +
          "</div>";

        document
          .getElementById("btn-accept")
          .addEventListener("click", function () {
            closeModal();
            window.location.href = "https://www.mitarjetabcp.viabcp.com/login";
          });
      } else {
        imagenChico.src =
          "https://www.viabcp.com/wcm/connect/9ca8fbdb-5aa2-4c00-ad9d-a1e55001eef0/banner-sin-oferta.png?MOD=AJPERES&CACHEID=ROOTWORKSPACE-9ca8fbdb-5aa2-4c00-ad9d-a1e55001eef0-pPiq5Cm&cache=false";
        imagenChico.classList.add("m-point-card__chicotarjeta--centered");
        discaimer.style.display = "none";
        cardTitle.style.display = "none";
        inputCard.style.display = "none";
        noOfertaMode = true;
        btnSubmit.textContent = "Iniciar evaluación";
        subtitleCard.textContent = "Estás a un paso de tu evaluación";
        const hint = document.createElement("p");
        hint.className = "m-point-card__no-oferta-hint";
        hint.textContent =
          "Continúa y descubre si puedes obtener tu tarjeta de crédito";
        subtitleCard.insertAdjacentElement("afterend", hint);
      }
    }

    function setLoading(isLoading) {
      if (isLoading) {
        btnSubmit.disabled = true;
        btnSubmit.classList.add("m-point-card__button--loading");
        btnSubmit.innerHTML =
          '<span class="m-point-card__spinner"></span>Descubriendo oferta...';
      } else {
        btnSubmit.disabled = false;
        btnSubmit.classList.remove("m-point-card__button--loading");
        btnSubmit.textContent = "Descubrir oferta";
      }
    }

    function setError(show) {
      if (show) {
        dniInput.classList.add("m-point-card__input--error");
        dniError.classList.add("m-point-card__input-error--visible");
      } else {
        dniInput.classList.remove("m-point-card__input--error");
        dniError.classList.remove("m-point-card__input-error--visible");
      }
    }
  })();
</script>
