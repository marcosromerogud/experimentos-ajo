    imgMobile:  { src: "https://www.viabcp.com/wcm/connect/deee39d2-aba4-4605-a2a7-d2917de9a0fd/landingAndo_entryPoint-mobile250226.png?MOD=AJPERES&attachment=false&id=1772061829963",  alt: "Imagen descriptiva mobile"  },

    scopeClass: "tc0030-scope",
    desktopStateClass: "tc0030--desktop",
    blockSelector: '[data-offer-id="tc0030"][data-instance="banner"]',

    debug: true
  };

  const log = (...a)=> CFG.debug && console.log("[tc0030]", ...a);
  const warn = (...a)=> CFG.debug && console.warn("[tc0030]", ...a);
  const $ = (s, r=document)=>{ try { return r.querySelector(s); } catch(e) { warn("querySelector error", s, e.message); return null; } };

  // ===== HTML (SIN escapes por ahora para aislar el problema) =====
  const html = `
<section class="tc0030-banner container" role="region" aria-label="Promoción destacada" data-offer-id="tc0030" data-instance="banner" data-version="3.2.0">
  <div class="tc0030-banner__content">
    <h2 class="tc0030-banner__title">${CFG.titleText}</h2>
    <p class="tc0030-banner__subtitle">${CFG.subtitleText}</p>
  </div>

  <div class="tc0030-banner__imageWrap">
    <img class="tc0030-banner__img" src="" alt="" loading="lazy" decoding="async" />
  </div>

  <div class="tc0030-banner__cta">
    <a class="tc0030-entry" href="${CFG.linkHref}" aria-label="${CFG.linkText} hacia ${CFG.linkHref}">${CFG.linkText}</a>
  </div>
</section>
`.trim();

  function isDesktopByBody(){
    const w = Math.round((document.body?.getBoundingClientRect().width) || window.innerWidth || 0);
    return w >= (CFG.bodyWidthBreakpoint || 1024);
  }

  function applyState(parent){
    const desktop = isDesktopByBody();
    parent.classList.toggle(CFG.desktopStateClass, desktop);

    const block = $(CFG.blockSelector, parent);
    if (!block) { warn("applyState: block no encontrado"); return; }

    // Imagen
    const img = block.querySelector(".tc0030-banner__img");
    if (img) {
      const chosen = desktop ? CFG.imgDesktop : CFG.imgMobile;
      img.src = (chosen && chosen.src) ? chosen.src : "";
      img.alt = (chosen && typeof chosen.alt === "string") ? chosen.alt : "";
      log("img set =>", desktop ? "desktop" : "mobile", img.src);
    } else {
      warn("No se encontró .tc0030-banner__img");
    }

    // Subtítulo visible solo en desktop (refuerzo inline)
    const sub = block.querySelector(".tc0030-banner__subtitle");
    if (sub) {
      sub.style.display = desktop ? "block" : "none";
      log("subtitle display:", sub.style.display);
    }
  }

  function safeInsert() {
    const parent = $(CFG.parentSelector);
    if (!parent) { warn("Parent no encontrado:", CFG.parentSelector); return; }

    // Asegurar scope manual
    if (!parent.classList.contains(CFG.scopeClass)) parent.classList.add(CFG.scopeClass);

    // Log del template (para ver exactamente qué se va a insertar)
    log("HTML a insertar:", html);

    // Inserción idempotente
    const already = $(CFG.blockSelector, parent);
    if (already) {
      log("Ya existe el bloque. No se duplica.");
    } else {
      parent.insertAdjacentHTML(CFG.insertPosition, html);
      log("HTML insertado con", CFG.insertPosition);
    }

    // Verificación POST-inserción
    const block = $(CFG.blockSelector, parent);
    if (!block) {
      warn("Post-inserción: NO se localizó el bloque. ¿El template fue alterado?");
      return;
    }

    // DEBUG del contenido interno
    const title = block.querySelector(".tc0030-banner__title");
    const sub   = block.querySelector(".tc0030-banner__subtitle");
    const cta   = block.querySelector(".tc0030-entry");

    log("DEBUG nodes =>", {
      titleExists: !!title, titleText: title?.textContent || "(vacío)",
      subtitleExists: !!sub, subtitleText: sub?.textContent || "(vacío)",
      ctaExists: !!cta, ctaHref: cta?.getAttribute("href") || "(sin href)", ctaText: cta?.textContent || "(vacío)"
    });

    // Refuerzo por si el parser hubiese vaciado algo (no debería, pero lo forzamos)
    if (title && !title.textContent) title.textContent = String(CFG.titleText || "");
    if (sub   && !sub.textContent)   sub.textContent   = String(CFG.subtitleText || "");
    if (cta) {
      if (!cta.textContent) cta.textContent = String(CFG.linkText || "");
      if (!cta.getAttribute("href")) cta.setAttribute("href", String(CFG.linkHref || "#"));
    }

    // Aplicar estado (desktop/mobile), setear imagen y visibilidad
    applyState(parent);

    // Listeners
    const onResize = (function(){ let id; return function(){ clearTimeout(id); id=setTimeout(()=>applyState(parent),120); }; })();
    window.addEventListener("resize", onResize, { passive:true });
    window.addEventListener("orientationchange", onResize, { passive:true });
  }

  // Run
  try {
    safeInsert();
  } catch (e) {
    console.error("[tc0030] EXCEPCIÓN en safeInsert:", e);
  }

})();
</script>

  if (!strongNode) {
    // Si no existe, reconstruir contenido con <strong> + resto
    sub.innerHTML = "";
    strongNode = document.createElement("strong");
    sub.appendChild(strongNode);
  }

  // Setear el texto del <strong> si está vacío o diferente
  if (strongText && strongNode.textContent.trim() !== strongText) {
    strongNode.textContent = strongText;
  }

  // Asegurar el resto del texto después del <strong>
  // 1) Quitar cualquier nodo posterior (para evitar duplicaciones)
  const toRemove = [];
  for (let n = strongNode.nextSibling; n; n = n.nextSibling) { toRemove.push(n); }
  toRemove.forEach(n => n.parentNode && n.parentNode.removeChild(n));

  // 2) Insertar un espacio y luego el resto (si existe)
  if (restText) {
    sub.appendChild(document.createTextNode(" " + restText));
  }
}

    if (cta) {
      if (!cta.textContent) cta.textContent = String(CFG.linkText || "");
      if (!cta.getAttribute("href")) cta.setAttribute("href", String(CFG.linkHref || "#"));
    }

    // Aplicar estado (desktop/mobile), setear imagen y visibilidad

    const visible = (rect.top <= vh - VIEW_OFFSET) && (rect.bottom >= 0 + VIEW_OFFSET);
