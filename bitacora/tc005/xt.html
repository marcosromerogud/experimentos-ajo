  // Funciones para trabajar la apertura y cierre de los detalles (NO MOVER)
  function closeDetail(detail) {
    const content = detail.querySelector('.summary-m-detail__content');
    const height = content.scrollHeight;
    
    // Rotar icono inmediatamente
    detail.classList.remove('rotating');
    
    // Establecer altura actual antes de animar
    content.style.height = height + 'px';
    
    // Forzar reflow
    content.offsetHeight;
    
    // Animar cierre
    content.style.height = '0px';
    content.style.opacity = '0';
    content.style.marginBottom = '0px';
    
    setTimeout(() => {
      detail.removeAttribute('open');
    }, 400);
  }
  function openDetail(detail) {
    // Rotar icono inmediatamente
    detail.classList.add('rotating');
    
    detail.setAttribute('open', '');
    const content = detail.querySelector('.summary-m-detail__content');
    
    // Obtener altura del contenido
    requestAnimationFrame(() => {
      const height = content.scrollHeight;
      
      // Iniciar desde 0
      content.style.height = '0px';
      content.style.opacity = '0';
      content.style.marginBottom = '0px';
      
      // Forzar reflow
      content.offsetHeight;
      
      // Animar apertura
      requestAnimationFrame(() => {
        content.style.height = height + 'px';
        content.style.opacity = '1';
        content.style.marginBottom = '32px';
      });
      
      // Limpiar altura después de la animación para que sea responsive
      setTimeout(() => {
        content.style.height = 'auto';
      }, 400);
    });
  }

  document.querySelectorAll('.summary-m-detail-container').forEach((detail) => {
 
    const summary = detail.querySelector('.summary-m-detail');
    
    summary.addEventListener('click', (e) => {
      e.preventDefault();
      
      const isOpen = detail.hasAttribute('open');
      
      if (!isOpen) {
        // Cerrar otras preguntas con animación suave
        document.querySelectorAll('.summary-m-detail-container').forEach((otherDetail) => {
          if (otherDetail !== detail && otherDetail.hasAttribute('open')) {
            closeDetail(otherDetail);
          }
        });
        
        // Abrir esta pregunta con animación
        setTimeout(() => {
          openDetail(detail);
        }, 50);
      } else {
        // Cerrar esta pregunta con animación suave
        closeDetail(detail);
      }
    });
  });
