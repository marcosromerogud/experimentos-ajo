        '    padding: 0;',
        '    text-align: center;',
        '  }',
        '',
        '  .bcp-experimento-categorias-carousel-track button[aria-current="true"] {',
        '    background: transparent;',
        '    box-shadow: none;',
        '  }',
        '',
        '  .bcp-experimento-categorias-carousel-track button::after {',
        '    display: none;',
        '  }',
        '',
        '  .bcp-experimento-categorias-carousel-track .bcp-experimento-categoria-icono {',
        '    background: #ffffff;',
        '    border-radius: 8px;',
        '    box-shadow: 0 2px 4px rgba(82, 112, 148, 0.20), 0 1px 10px rgba(82, 112, 148, 0.12);',
        '    flex: 0 0 76px;',
        '    height: 76px;',
        '    overflow: hidden;',
        '    position: relative;',
        '    width: 76px;',
        '  }',
        '',
        '  .bcp-experimento-categorias-carousel-track .bcp-experimento-categoria-icono::after {',
        '    background: #0030B3;',
        '    bottom: -5px;',
        '    content: "";',
        '    height: 8px;',
        '    left: 0;',
        '    opacity: 0;',
        '    position: absolute;',
        '    right: 0;',
        '  }',
        '',
        '  .bcp-experimento-categorias-carousel-track button[aria-current="true"] .bcp-experimento-categoria-icono::after {',
        '    opacity: 1;',
        '  }',
        '',
        '  .bcp-experimento-categorias-carousel-track .bcp-experimento-categoria-icono svg,',
        '  .bcp-experimento-categorias-carousel-track .bcp-experimento-categoria-icono img {',
        '    flex: 0 0 48px;',
        '    height: 48px;',
        '    object-fit: contain;',
        '    width: 48px;',
        '  }',
        '',
        '  .bcp-experimento-categorias-carousel-track .bcp-experimento-categoria-texto {',
        '    display: block;',
        '    max-width: 100%;',
        '    overflow: hidden;',
        '    text-overflow: ellipsis;',
        '    white-space: nowrap;',
        '  }',
        '}'
      ].join('\n');

      let style = document.getElementById(EXPERIMENT_STYLE_ID);

      if (!style) {
        style = document.createElement('style');
        style.id = EXPERIMENT_STYLE_ID;
        document.head.appendChild(style);
      }

      style.textContent = css;
    }

    function updateMainTitle() {
      const title = document.querySelector(MAIN_TITLE_SELECTOR);

      if (title) {
        title.textContent = 'Descubre por categoría';
      }
    }

    function trackPromotionView() {
      if (promotionViewTracked) {
        return;
      }

      window.digitalData = window.digitalData || [];

      if (typeof window.digitalData.push !== 'function') {
        return;
      }

      window.digitalData.push({
        promotion: {
          name: 'Beneficios CSI - ViaBCP - ' + TRACKING_EXPERIMENT_CODE + ' - ' + TRACKING_VARIANT,
          creative: TRACKING_CREATIVE,
          position: TRACKING_POSITION
        },
        event: 'trackPromotionView'
      });

      promotionViewTracked = true;
    }

    function trackPromotionClick(categoryName) {
      window.digitalData = window.digitalData || [];

      if (typeof window.digitalData.push !== 'function') {
        return;
      }

      window.digitalData.push({
        promotion: {
          name: 'Beneficios CSI - ViaBCP - ' + TRACKING_EXPERIMENT_CODE + ' - ' + TRACKING_VARIANT,
          creative: TRACKING_CREATIVE,
          position: TRACKING_POSITION + ' -' + categoryName.trim()
        },
        event: 'trackPromotionClick'
      });
    }

    function getFirstRowSize() {
      return window.matchMedia(MOBILE_BREAKPOINT_QUERY).matches
        ? MOBILE_FIRST_ROW_SIZE
        : DESKTOP_FIRST_ROW_SIZE;
    }

    function getCategoryLabelMode() {
      return window.matchMedia(DESKTOP_LABEL_BREAKPOINT_QUERY).matches
        ? 'desktop'
        : 'compact';
    }

    function getCategoryName(slide, index) {
      const categoryTitle = slide.querySelector(CATEGORY_TITLE_SELECTOR);
      const categoryName = categoryTitle ? categoryTitle.textContent.trim() : '';

      return categoryName || 'Categoria ' + (index + 1);
    }

    function getCategorySignature(slides) {
      return slides
        .map((slide, index) => getCategoryName(slide, index))
        .join('|');
    }

    function areSameCategorySlides(slides) {
      return slides.length === renderedCategorySlides.length &&
        slides.every((slide, index) => slide === renderedCategorySlides[index]);
    }

    function getCurrentCategorySlide(index) {
      const container = document.querySelector(CATEGORY_CONTAINER_SELECTOR);
      const slides = container
        ? Array.from(container.querySelectorAll(CATEGORY_SLIDE_SELECTOR))
        : [];

      return slides[index] || null;
    }

    function triggerOriginalCategoryClick(slide) {
      if (!slide) {
        return;
      }

      const clickTarget = slide.querySelector('a, button, [role="button"]') || slide;

      if (typeof clickTarget.click === 'function') {
        clickTarget.click();
      } else {
        clickTarget.dispatchEvent(new MouseEvent('click', {
          bubbles: true,
          cancelable: true,
          view: window
        }));
      }
    }

    function syncActiveCategory(grid, slides) {
      const activeIndexes = slides
        .map((slide, index) => slide.classList.contains('active') ? index : -1)
        .filter((index) => index >= 0);
      const activeIndex = activeIndexes.length ? activeIndexes[0] : -1;

      if (selectedCategoryIndex !== null) {
        setCurrentButton(grid, selectedCategoryIndex);
        return;
      }

      if (activeIndex >= 0) {
        selectedCategoryIndex = activeIndex;
        setCurrentButton(grid, activeIndex);
        return;
      }

      if (selectedCategoryIndex !== null) {
        setCurrentButton(grid, selectedCategoryIndex);
        return;
      }

      setCurrentButton(grid, activeIndex);
    }

    function setCurrentButton(grid, activeIndex) {
      const buttons = Array.from(grid.querySelectorAll('[data-categoria-index]'));

      buttons.forEach((button, index) => {
        if (Number(button.dataset.categoriaIndex) === activeIndex) {
          button.setAttribute('aria-current', 'true');
        } else {
          button.removeAttribute('aria-current');
        }
      });
    }

    function getCategorySvgMarkup(categoryName) {
      const normalizedCategoryName = categoryName.trim().toLowerCase();

      if (
        normalizedCategoryName.indexOf('american express') === 0 ||
        normalizedCategoryName.indexOf('amarican express') === 0
      ) {
        return CATEGORY_SVGS['american express'];
      }

      return CATEGORY_SVGS[normalizedCategoryName];
    }

    function createCategoryIcon(slide, categoryName) {
      const icon = document.createElement('span');
      const originalIcon = slide.querySelector(CATEGORY_ICON_SELECTOR);
      const imageSrc = CATEGORY_IMAGES[categoryName];
      const svgMarkup = getCategorySvgMarkup(categoryName);

      icon.className = 'bcp-experimento-categoria-icono';

      if (svgMarkup) {
        icon.innerHTML = svgMarkup;
      } else if (imageSrc) {
        const image = document.createElement('img');

        image.src = imageSrc;
        image.alt = '';
        image.loading = 'lazy';
        icon.appendChild(image);
      } else if (originalIcon) {
        icon.appendChild(originalIcon.cloneNode(true));
      }

      return icon;
    }

    function getCategoryDisplayName(categoryName) {
      const normalizedCategoryName = categoryName.trim().toLowerCase();

      if (normalizedCategoryName === 'día del padre' || normalizedCategoryName === 'dia del padre') {
        return getCategoryLabelMode() === 'desktop' ? 'Día del Padre' : 'Papá';
      }

      if (
        normalizedCategoryName.indexOf('american express') === 0 ||
        normalizedCategoryName.indexOf('amarican express') === 0
      ) {
        return getCategoryLabelMode() === 'desktop' ? 'American Express' : 'Amex';
      }

      const firstWord = categoryName.trim().split(/\s+/)[0];

      return firstWord || categoryName;
    }

    function createCategoryItem(slide, index, categoryName, grid) {
      const item = document.createElement('li');
      const button = document.createElement('button');
      const label = document.createElement('span');

      button.type = 'button';
      button.dataset.categoriaIndex = String(index);
      button.setAttribute('aria-label', categoryName);
      label.className = 'bcp-experimento-categoria-texto';
      label.textContent = getCategoryDisplayName(categoryName);
      button.appendChild(createCategoryIcon(slide, categoryName));
      button.appendChild(label);
      button.addEventListener('click', function () {
        const currentSlide = getCurrentCategorySlide(index) || slide;

        selectedCategoryIndex = index;
        setCurrentButton(grid, index);
        trackPromotionClick(categoryName);
        triggerOriginalCategoryClick(currentSlide);
      });

      item.appendChild(button);
      return item;
    }

    function createCarouselControls(carousel, track) {
      const nav = document.createElement('div');
      const previous = document.createElement('button');
      const next = document.createElement('button');
      const visibleItemsPerPage = DESKTOP_FIRST_ROW_SIZE;
      let currentPage = 0;

      nav.className = EXPERIMENT_CAROUSEL_NAV_CLASS;
      previous.type = 'button';
      next.type = 'button';
      previous.setAttribute('aria-label', 'Ver categorias anteriores');
      next.setAttribute('aria-label', 'Ver mas categorias');
      previous.innerHTML = [
        '<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">',
        '<circle r="23.5" transform="matrix(-1.19249e-08 -1 -1 1.19249e-08 24 24)" fill="#FF7800" stroke="#FF7800"></circle>',
        '<path fill-rule="evenodd" clip-rule="evenodd" d="M31.998 24.9979L18.414 24.9979L21.709 28.2929C22.1 28.6839 22.1 29.3159 21.709 29.7069C21.318 30.0979 20.685 30.0979 20.295 29.7069L15.295 24.7069C14.904 24.3159 14.904 23.6839 15.295 23.2929L20.291 18.2929C20.486 18.0979 20.742 17.9999 20.998 17.9999C21.254 17.9999 21.51 18.0979 21.705 18.2929C22.096 18.6829 22.096 19.3159 21.706 19.7069L18.417 22.9979L31.998 22.9979C32.551 22.9979 32.998 23.4449 32.998 23.9979C32.998 24.5509 32.551 24.9979 31.998 24.9979Z" fill="white"></path>',
        '</svg>'
      ].join('');
      next.innerHTML = [
        '<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">',
        '<circle cx="24" cy="24" r="23.5" transform="rotate(-90 24 24)" fill="#FF7800" stroke="#FF7800"></circle>',
        '<path fill-rule="evenodd" clip-rule="evenodd" d="M16.0024 24.9979L29.5864 24.9979L26.2914 28.2929C25.9004 28.6839 25.9004 29.3159 26.2914 29.7069C26.6824 30.0979 27.3154 30.0979 27.7054 29.7069L32.7054 24.7069C33.0964 24.3159 33.0964 23.6839 32.7054 23.2929L27.7094 18.2929C27.5144 18.0979 27.2584 17.9999 27.0024 17.9999C26.7464 17.9999 26.4904 18.0979 26.2954 18.2929C25.9044 18.6829 25.9044 19.3159 26.2944 19.7069L29.5834 22.9979L16.0024 22.9979C15.4494 22.9979 15.0024 23.4449 15.0024 23.9979C15.0024 24.5509 15.4494 24.9979 16.0024 24.9979Z" fill="white"></path>',
        '</svg>'
      ].join('');

      function getMaxPage() {
        return Math.max(0, Math.ceil(track.children.length / visibleItemsPerPage) - 1);
      }

      function updateControlState() {
        const maxPage = getMaxPage();

        if (track.clientWidth > 0) {
          currentPage = Math.min(maxPage, Math.max(0, Math.round(track.scrollLeft / track.clientWidth)));
        }

        previous.disabled = currentPage <= 0;
        next.disabled = currentPage >= maxPage;
      }

      function scrollToCurrentPage() {
        const target = track.children[currentPage * visibleItemsPerPage];
        const left = target ? target.offsetLeft - track.offsetLeft : currentPage * track.clientWidth;

        if (track.scrollTo) {
          track.scrollTo({
            left: left,
            behavior: 'smooth'
          });
        } else {
          track.scrollLeft = left;
        }

        updateControlState();
        window.setTimeout(updateControlState, 350);
      }

      previous.addEventListener('click', function () {
        currentPage = Math.max(0, currentPage - 1);
        scrollToCurrentPage();
      });

      next.addEventListener('click', function () {
        currentPage = Math.min(getMaxPage(), currentPage + 1);
        scrollToCurrentPage();
      });

      track.addEventListener('scroll', updateControlState, { passive: true });
      window.addEventListener('resize', updateControlState);

      nav.appendChild(previous);
      nav.appendChild(next);
      carousel.appendChild(nav);
      requestAnimationFrame(updateControlState);
      window.setTimeout(updateControlState, 250);
      window.setTimeout(updateControlState, 800);

      return function cleanupControls() {
        track.removeEventListener('scroll', updateControlState);
        window.removeEventListener('resize', updateControlState);
      };
    }

    function createCategoryGrid(container, slides) {
      if (activeCategoryObserver) {
        activeCategoryObserver.disconnect();
      }

      if (cleanupCarouselControls) {
        cleanupCarouselControls();
        cleanupCarouselControls = null;
      }

      document.querySelectorAll('.bcp-experimento-lista-categorias, .' + EXPERIMENT_SECTION_CLASS)
        .forEach((element) => element.remove());

      const section = document.createElement('section');
      const grid = document.createElement('ul');
      const carousel = document.createElement('div');
      const carouselTrack = document.createElement('ul');

      section.className = EXPERIMENT_SECTION_CLASS;
      grid.className = EXPERIMENT_GRID_CLASS;
      carousel.className = EXPERIMENT_CAROUSEL_CLASS;
      carouselTrack.className = EXPERIMENT_CAROUSEL_TRACK_CLASS;
      section.appendChild(grid);
      carousel.appendChild(carouselTrack);
      section.appendChild(carousel);

      const firstRowSize = getFirstRowSize();
      container.dataset.experimentoFirstRowSize = String(firstRowSize);

      slides.forEach((slide, index) => {
        const categoryName = getCategoryName(slide, index);
        const targetList = index < firstRowSize ? grid : carouselTrack;

        targetList.appendChild(createCategoryItem(slide, index, categoryName, section));
      });

      if (!carouselTrack.children.length) {
        carousel.remove();
      } else {
        cleanupCarouselControls = createCarouselControls(carousel, carouselTrack);
      }

      container.before(section);
      container.hidden = true;

      const navigation = container
        .closest('.bcp-contenedor-filtros')
        ?.querySelector('.bcp-div-category');

      if (navigation) {
        navigation.hidden = true;
      }

      syncActiveCategory(grid, slides);

      const observer = new MutationObserver(function () {
        syncActiveCategory(grid, slides);
      });

      activeCategoryObserver = observer;

      slides.forEach((slide) => {
        observer.observe(slide, {
          attributes: true,
          attributeFilter: ['class']
        });
      });
    }

    function setupResponsiveSplit(container) {
      if (cleanupResponsiveSplit) {
        cleanupResponsiveSplit();
        cleanupResponsiveSplit = null;
      }

      const mediaQueries = [
        window.matchMedia(MOBILE_BREAKPOINT_QUERY),
        window.matchMedia(DESKTOP_LABEL_BREAKPOINT_QUERY)
      ];
      const cleanupMediaQueries = [];

      function rerenderOnBreakpointChange() {
        const nextFirstRowSize = String(getFirstRowSize());
        const nextLabelMode = getCategoryLabelMode();

        if (
          container.dataset.experimentoFirstRowSize !== nextFirstRowSize ||
          container.dataset.experimentoCategoriaLabelMode !== nextLabelMode
        ) {
          renderCategoryGrid();
        }
      }

      mediaQueries.forEach((media) => {
        if (media.addEventListener) {
          media.addEventListener('change', rerenderOnBreakpointChange);
          cleanupMediaQueries.push(function () {
            media.removeEventListener('change', rerenderOnBreakpointChange);
          });
        } else if (media.addListener) {
          media.addListener(rerenderOnBreakpointChange);
          cleanupMediaQueries.push(function () {
            media.removeListener(rerenderOnBreakpointChange);
          });
        }
      });

      cleanupResponsiveSplit = function () {
        cleanupMediaQueries.forEach((cleanup) => cleanup());
      };
    }

    function renderCategoryGrid() {
      const container = document.querySelector(CATEGORY_CONTAINER_SELECTOR);

      if (!container) {
        return false;
      }

      const slides = Array.from(container.querySelectorAll(CATEGORY_SLIDE_SELECTOR));

      if (!slides.length) {
        return false;
      }

      const categorySignature = getCategorySignature(slides);
      const firstRowSize = String(getFirstRowSize());
      const categoryLabelMode = getCategoryLabelMode();

      if (
        container.dataset.experimentoCategorias === 'grid-casero' &&
        container.dataset.experimentoCategoriaFirma === categorySignature &&
        container.dataset.experimentoFirstRowSize === firstRowSize &&
        container.dataset.experimentoCategoriaLabelMode === categoryLabelMode &&
        areSameCategorySlides(slides)
      ) {
        return true;
      }

      if (selectedCategoryIndex !== null && selectedCategoryIndex >= slides.length) {
        selectedCategoryIndex = null;
      }

      injectExperimentStyles();
      updateMainTitle();
      container.dataset.experimentoCategorias = 'grid-casero';
      container.dataset.experimentoCategoriaFirma = categorySignature;
      container.dataset.experimentoCategoriaLabelMode = categoryLabelMode;
      createCategoryGrid(container, slides);
      renderedCategorySlides = slides;
      setupResponsiveSplit(container);
      trackPromotionView();
      return true;
    }

    function scheduleRenderCategoryGrid() {
      if (renderCategoryFrame) {
        return;
      }

      renderCategoryFrame = requestAnimationFrame(function () {
        renderCategoryFrame = null;
        renderCategoryGrid();
      });
    }

    renderCategoryGrid();

    const observer = new MutationObserver(scheduleRenderCategoryGrid);

    observer.observe(document.documentElement, {
      childList: true,
      subtree: true
    });
  })();
</script>
