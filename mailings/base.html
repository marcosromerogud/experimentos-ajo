<div> .
<style>

/* ---------------------------------------------------------------------------
   RESET EMAIL
   Normaliza renderizado en Gmail / Outlook
   --------------------------------------------------------------------------- */

.container > tbody > tr > td {
  padding:0 20px!important;
}

  .col-mobile-1 .td-left{
    text-align:left!important;
  }
body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;color:#494f66;font-size:14px}
table{border-collapse:collapse;mso-table-lspace:0;mso-table-rspace:0}
img{display:block;border:0;outline:0;height:auto;-ms-interpolation-mode:bicubic}

/* ---------------------------------------------------------------------------
   ANTI-WIDTH-OUT
   Evita que textos largos expandan el ancho del contenedor.
   Permite crecimiento solo vertical.
--------------------------------------------------------------------------- */
.anti-width-out{
  word-break:break-all;
  word-wrap:break-word;
  overflow-wrap:break-word;
}

/* ---------------------------------------------------------------------------
   MOBILE · 1 COLUMNA
   Aplica solo a elementos con clase .col-mobile-1
   En mobile todo queda vertical y centrado.
--------------------------------------------------------------------------- */
@media only screen and (max-width:480px){
  .container{
    width:100%!important;
    max-width:100%!important;
  }
  .col-mobile-1{
    display:block!important;
    width:100%!important;
    max-width:100%!important;
    box-sizing:border-box!important;
    text-align:center!important;
    padding-left:0!important;
  }
  .col-mobile-1 td{
    text-align:center!important;
  }
  .col-mobile-1 img{
    margin:0 auto!important;
  }
}
</style></div>
